# Belt Tension Calibration Macros for Voron V2.4 300mm
#
# Three methods:
#   1. BELT_TENSION_CHECK — ADXL345 + Shake&Tune automated A/B comparison (primary)
#   2. BELT_PLUCK_POSITION — Move toolhead for acoustic pluck measurement
#   3. BELT_EXCITE — Drive single belt at fixed frequency (for phone slow-mo or diagnosis)
#
# Physics: f = (1/2L) × sqrt(T/μ)
#   GT2 6mm belt: μ = 0.0083 kg/m
#   Target tension: ~9N (2 lbf) → ~110 Hz at 150mm span
#   f × L = 16,500 Hz·mm (constant at 9N)
#
# Belt span geometry:
#   belt_span = Y_nozzle + C
#   where C = offset from nozzle to Y-carriage belt clamp minus front idler offset
#   MEASURE C on your printer: home XY, move to Y=0, measure front idler to Y-carriage distance
#
# Temperature: belt tension drops 5-10% from cold to 110°C bed. Measure at operating temp!

[gcode_macro BELT_TENSION_CHECK]
description: Run Shake&Tune belt comparison (requires Shake&Tune installed)
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        {action_raise_error("Must home first! Run G28.")}
    {% endif %}

    STATUS_CALIBRATING_Z  ; LED feedback
    G0 X151 Y154 Z100 F12000  ; center of travel for consistent belt geometry
    M400

    COMPARE_BELTS_RESPONSES

    STATUS_READY
    M117 Belt comparison complete - check ShakeTune_results

[gcode_macro BELT_PLUCK_POSITION]
description: Move toolhead to create a specific belt free-span for acoustic pluck measurement
# IMPORTANT: Measure offset_c on YOUR printer!
#   Home XY, move to Y=0, measure distance from front idler center to Y-carriage belt clamp.
#   Update the value below. Typical V2.4 Stealthburner: 15-25mm.
variable_offset_c: 20  ; <-- MEASURE THIS! belt_span = Y_nozzle + offset_c
gcode:
    {% set span = params.SPAN|default(75)|float %}
    {% set c = printer["gcode_macro BELT_PLUCK_POSITION"].offset_c %}
    {% set y_pos = span - c %}
    {% set x_center = printer.configfile.config["stepper_x"]["position_max"]|float / 2 %}
    {% set freq = (16500 / span)|round(0)|int %}

    {% if "xy" not in printer.toolhead.homed_axes %}
        {action_raise_error("Must home XY first! Run G28 X Y.")}
    {% endif %}
    {% if y_pos < 0 %}
        {action_raise_error("Span %.0fmm too short! Min usable span = %.0fmm (offset C)" % (span, c))}
    {% endif %}
    {% if span < 40 %}
        {action_respond_info("WARNING: Span %.0fmm is very short — belt may be hard to pluck" % span)}
    {% endif %}

    G0 X{x_center} Y{y_pos} F3000
    M400
    M117 Span:{span|int}mm Freq:{freq}Hz@9N  Pluck front belt segment!
    {action_respond_info("Belt pluck position: span=%.0fmm, expected freq=%dHz at 9N tension" % (span, freq))}
    {action_respond_info("Pluck the exposed belt between front idler and Y-carriage on each side")}
    {action_respond_info("Use Spectroid app to capture frequency. A & B belts should match within 5Hz")}

[gcode_macro BELT_EXCITE]
description: Excite individual belt at a specific frequency (requires Shake&Tune)
gcode:
    {% set belt = params.BELT|default("a")|string|lower %}
    {% set freq = params.FREQ|default(110)|float %}
    {% set duration = params.DURATION|default(30)|int %}

    {% if belt not in ["a", "b"] %}
        {action_raise_error("BELT must be 'a' or 'b'. A=left/stepper_y, B=right/stepper_x")}
    {% endif %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        {action_raise_error("Must home first! Run G28.")}
    {% endif %}

    {action_respond_info("Exciting belt %s at %.1f Hz for %d seconds..." % (belt|upper, freq, duration))}
    {action_respond_info("TIP: Film with phone 240fps slow-mo to see belt vibration")}

    EXCITATE_AXIS_AT_FREQ AXIS={belt} FREQUENCY={freq} DURATION={duration}
