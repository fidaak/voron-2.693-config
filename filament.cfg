#####################################################################
#   Filament Macros — LOAD, UNLOAD, EXCHANGE, M600
#   For Orbiter v2 direct drive extruder on Voron V2.4 Stealthburner
#   Requires: [respond], [save_variables], [filament_switch_sensor]
#
#   Design: "Smart defaults, manual override"
#   - Sensor is ADVISORY — shows prompts, never moves motors autonomously
#   - Three-way temp: hot=immediate, warming=wait, cold=presets
#   - Hotend-aware distances (Dragon HF / Rapido UHF / Raptor)
#   - Sensor disabled during motor ops + 60s safety net
#
#   Path: Orbiter v2 gears → PTFE tube (~40mm) → hotend heatbreak → nozzle
#   Total path Dragon HF ~85mm, Rapido UHF ~95mm (old FORCE_MOVE used 93mm)
#
#   Jinja note: all {% set %} evaluate at macro START, not at G-code
#   execution time. Hotend lookups are inline per-macro for this reason.
#####################################################################

#####################################################################
#   State management — re-entrancy guard
#####################################################################

[gcode_macro _FILAMENT_STATE]
variable_loading: 0
gcode:
    # State holder only — not called directly

#####################################################################
#   Tip forming primitive — single source of truth
#   Called from: PRINT_END, CANCEL_PRINT, PRINT_START, _FILAMENT_PARK
#####################################################################

[gcode_macro _FILAMENT_TIP_FORM]
description: Form filament tip and retract into heatbreak cool zone (hotend-aware)
gcode:
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=echo MSG="Tip form skipped — extruder too cold"
    {% else %}
        # Hotend-aware cool zone retract distance
        # Must clear full hotzone so tip solidifies in heatbreak
        # Formula: hotzone_length + 2mm (push-pull net) + 2mm (safety margin)
        # Source: printers/v24/schematics/Hotends/ CAD measurements
        {% set svv = printer.save_variables.variables %}
        {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
        # Dragon HF: hotzone 26mm → 30mm retract | Rapido UHF: 25.5mm → 30mm | Raptor: 18.5mm → 23mm
        {% if hotend == "rapido_uhf" %}
            {% set cool_retract = 30 %}
        {% elif hotend == "raptor" %}
            {% set cool_retract = 23 %}
        {% else %}
            {% set cool_retract = 30 %}
        {% endif %}
        SAVE_GCODE_STATE NAME=tip_form
        M83
        G1 E3 F3600                  ; push to melt zone
        G1 E-3 F3600                 ; quick retract — start tip
        G1 E2 F1800                  ; slow push — seal tip
        G1 E-{cool_retract} F600    ; retract into heatbreak cool zone (hotend-aware)
        G4 P1500                     ; 1.5s dwell — solidify tip in cool zone
        RESTORE_GCODE_STATE NAME=tip_form
        RESPOND TYPE=echo MSG="Tip formed ({hotend}: {cool_retract}mm retract past hotzone)"
    {% endif %}

#####################################################################
#   LOAD_FILAMENT — Three-way temp + hotend-aware distances
#####################################################################

[gcode_macro LOAD_FILAMENT]
description: Load filament with smart temperature handling and purge check
gcode:
    # Re-entrancy guard
    {% if printer["gcode_macro _FILAMENT_STATE"].loading == 1 %}
        RESPOND TYPE=error MSG="Filament operation already in progress"
    {% else %}
        {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
        {% set target_temp = printer.extruder.target|float %}
        # Hotend-aware distances (Orbiter v2 → PTFE → hotend → nozzle)
        {% set svv = printer.save_variables.variables %}
        {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
        {% if hotend == "rapido_uhf" %}
            {% set feed = 85 %}
            {% set purge = 30 %}
        {% elif hotend == "raptor" %}
            {% set feed = 80 %}
            {% set purge = 25 %}
        {% else %}
            {% set feed = 75 %}
            {% set purge = 25 %}
        {% endif %}

        {% if printer.extruder.can_extrude %}
            # --- HOT PATH: load immediately ---
            SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=1
            SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
            UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=60
            RESPOND TYPE=command MSG="action:prompt_end"
            SAVE_GCODE_STATE NAME=load_filament
            M83
            G1 E{feed} F600              ; feed through PTFE + heatbreak to nozzle
            G1 E{purge} F200             ; slow purge to prime nozzle
            RESTORE_GCODE_STATE NAME=load_filament
            SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
            UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0
            SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
            RESPOND MSG="Filament loaded ({hotend}: E{feed}+E{purge})"
            # Purge check → then park choice
            RESPOND TYPE=command MSG="action:prompt_begin Purge Check"
            RESPOND TYPE=command MSG="action:prompt_text Is the color clean?"
            RESPOND TYPE=command MSG="action:prompt_footer_button Done|_FILAMENT_LOAD_DONE|primary"
            RESPOND TYPE=command MSG="action:prompt_footer_button Purge More|_FILAMENT_PURGE_MORE|secondary"
            RESPOND TYPE=command MSG="action:prompt_show"
        {% elif target_temp >= min_temp %}
            # --- WARMING PATH: target set, wait for it ---
            RESPOND MSG="Waiting for extruder to reach {target_temp|int}C..."
            M117 Heating to {target_temp|int}C...
            M109 S{target_temp|int}
            M117
            LOAD_FILAMENT
        {% else %}
            # --- COLD PATH: show material preset dialog ---
            RESPOND TYPE=command MSG="action:prompt_end"
            RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
            RESPOND TYPE=command MSG="action:prompt_text Extruder is cold ({printer.extruder.temperature|int}C). Select material:"
            RESPOND TYPE=command MSG="action:prompt_button ABS / ASA (255C)|_FILAMENT_HEAT_AND_LOAD TEMP=255|primary"
            RESPOND TYPE=command MSG="action:prompt_button PETG (230C)|_FILAMENT_HEAT_AND_LOAD TEMP=230|secondary"
            RESPOND TYPE=command MSG="action:prompt_button PLA (215C)|_FILAMENT_HEAT_AND_LOAD TEMP=215|secondary"
            RESPOND TYPE=command MSG="action:prompt_button PA / PA-CF (275C)|_FILAMENT_HEAT_AND_LOAD TEMP=275|secondary"
            RESPOND TYPE=command MSG="action:prompt_button PC (275C)|_FILAMENT_HEAT_AND_LOAD TEMP=275|secondary"
            RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_FILAMENT_CANCEL_PROMPT|error"
            RESPOND TYPE=command MSG="action:prompt_show"
        {% endif %}
    {% endif %}

[gcode_macro _FILAMENT_HEAT_AND_LOAD]
description: Heat extruder to TEMP then load filament
gcode:
    {% set temp = params.TEMP|int %}
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Heating to {temp}C..."
    M117 Heating to {temp}C...
    M104 S{temp}
    M109 S{temp}
    M117
    LOAD_FILAMENT

#####################################################################
#   Post-load: purge loop + park choice
#####################################################################

[gcode_macro _FILAMENT_PURGE_MORE]
description: Purge more filament and re-prompt
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=error MSG="Extruder cooled down! Heat first, then try again."
    {% else %}
        {% set svv = printer.save_variables.variables %}
        {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
        {% if hotend == "rapido_uhf" %}
            {% set purge = 30 %}
        {% else %}
            {% set purge = 25 %}
        {% endif %}
        SAVE_GCODE_STATE NAME=purge_more
        M83
        G1 E{purge} F200
        RESTORE_GCODE_STATE NAME=purge_more
        RESPOND TYPE=command MSG="action:prompt_begin Purge Check"
        RESPOND TYPE=command MSG="action:prompt_text Is the color clean now?"
        RESPOND TYPE=command MSG="action:prompt_footer_button Done|_FILAMENT_LOAD_DONE|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Purge More|_FILAMENT_PURGE_MORE|secondary"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _FILAMENT_LOAD_DONE]
description: After purge is clean — ask print now or park
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Filament Ready"
    RESPOND TYPE=command MSG="action:prompt_text Filament loaded and primed."
    RESPOND TYPE=command MSG="action:prompt_text Printing soon, or park filament?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Print Soon — Keep Hot|_FILAMENT_KEEP_HOT|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Park — Retract and Cool|_FILAMENT_PARK|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _FILAMENT_KEEP_HOT]
description: Keep extruder at temp — user will print soon
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Filament ready — extruder staying hot"

[gcode_macro _FILAMENT_PARK]
description: Park filament — tip forming + retract into heatbreak, cool down
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=error MSG="Extruder too cold to park — just cooling down"
        M104 S0
    {% else %}
        _FILAMENT_TIP_FORM
        M104 S0                          ; heater off
        RESPOND MSG="Filament parked — tip formed and retracted into heatbreak, cooling down"
    {% endif %}

[gcode_macro _FILAMENT_CANCEL_PROMPT]
description: Cancel/dismiss any filament dialog
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

#####################################################################
#   UNLOAD_FILAMENT — Hotend-aware tip forming + sensor verify
#####################################################################

[gcode_macro UNLOAD_FILAMENT]
description: Unload filament with hotend-aware tip forming and sensor verification
gcode:
    # Re-entrancy guard
    {% if printer["gcode_macro _FILAMENT_STATE"].loading == 1 %}
        RESPOND TYPE=error MSG="Filament operation already in progress"
    {% else %}
        {% set min_temp = printer.configfile.settings.extruder.min_extrude_temp|float %}
        {% set target_temp = printer.extruder.target|float %}
        # Hotend-aware retract distances (CAD-verified: printers/v24/schematics/Hotends/)
        # cool_retract must clear full hotzone into heatbreak
        {% set svv = printer.save_variables.variables %}
        {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
        # cool_retract clears hotzone into heatbreak; final_retract clears gears
        {% if hotend == "rapido_uhf" %}
            {% set cool_retract = 30 %}
            {% set final_retract = 30 %}
        {% elif hotend == "raptor" %}
            {% set cool_retract = 23 %}
            {% set final_retract = 45 %}
        {% else %}
            {% set cool_retract = 30 %}
            {% set final_retract = 35 %}
        {% endif %}

        {% if printer.extruder.can_extrude %}
            # --- HOT PATH: unload immediately ---
            SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=1
            SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
            UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=60
            SAVE_GCODE_STATE NAME=unload_filament
            M83
            # Tip forming + cooling dwell + retract
            G1 E3 F3600                  ; push to melt zone
            G1 E-3 F3600                 ; quick retract — start tip
            G1 E2 F1800                  ; slow push — seal tip
            G1 E-{cool_retract} F600    ; retract into heatbreak cool zone (past hotzone)
            G4 P1500                     ; 1.5s dwell — solidify tip
            G1 E-{final_retract} F600   ; final retract clear of gears
            RESTORE_GCODE_STATE NAME=unload_filament
            SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
            UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0
            SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
            RESPOND MSG="Filament unloaded ({hotend}: {cool_retract+final_retract+5}mm retract)"
            # Wait for moves, then verify sensor
            M400
            _UNLOAD_VERIFY
        {% elif target_temp >= min_temp %}
            # --- WARMING PATH: target set, wait for it ---
            RESPOND MSG="Waiting for extruder to reach {target_temp|int}C for unload..."
            M117 Heating to {target_temp|int}C...
            M109 S{target_temp|int}
            M117
            UNLOAD_FILAMENT
        {% else %}
            # --- COLD PATH: show material preset dialog ---
            RESPOND TYPE=command MSG="action:prompt_end"
            RESPOND TYPE=command MSG="action:prompt_begin Unload Filament"
            RESPOND TYPE=command MSG="action:prompt_text Extruder is cold ({printer.extruder.temperature|int}C). Select material:"
            RESPOND TYPE=command MSG="action:prompt_button ABS / ASA (255C)|_FILAMENT_HEAT_AND_UNLOAD TEMP=255|primary"
            RESPOND TYPE=command MSG="action:prompt_button PETG (230C)|_FILAMENT_HEAT_AND_UNLOAD TEMP=230|secondary"
            RESPOND TYPE=command MSG="action:prompt_button PLA (215C)|_FILAMENT_HEAT_AND_UNLOAD TEMP=215|secondary"
            RESPOND TYPE=command MSG="action:prompt_button PA / PA-CF (275C)|_FILAMENT_HEAT_AND_UNLOAD TEMP=275|secondary"
            RESPOND TYPE=command MSG="action:prompt_button PC (275C)|_FILAMENT_HEAT_AND_UNLOAD TEMP=275|secondary"
            RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_FILAMENT_CANCEL_PROMPT|error"
            RESPOND TYPE=command MSG="action:prompt_show"
        {% endif %}
    {% endif %}

[gcode_macro _FILAMENT_HEAT_AND_UNLOAD]
description: Heat extruder to TEMP then unload filament
gcode:
    {% set temp = params.TEMP|int %}
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Heating to {temp}C for unload..."
    M117 Heating to {temp}C...
    M104 S{temp}
    M109 S{temp}
    M117
    UNLOAD_FILAMENT

[gcode_macro _UNLOAD_VERIFY]
description: Check sensor after unload moves complete (Jinja evals fresh here after M400)
gcode:
    {% if printer["filament_switch_sensor toolhead_filament_sensor"].filament_detected %}
        RESPOND TYPE=error MSG="Filament still detected after unload — pull gently from the top"
    {% else %}
        RESPOND MSG="Filament clear of sensor"
    {% endif %}

#####################################################################
#   EXCHANGE_FILAMENT — Prusa-style unload + load in one wizard
#####################################################################

[gcode_macro EXCHANGE_FILAMENT]
description: Swap filament — select new type, unload old, load new (Prusa-style)
gcode:
    {% if printer["gcode_macro _FILAMENT_STATE"].loading == 1 %}
        RESPOND TYPE=error MSG="Filament operation already in progress"
    {% elif printer.print_stats.state == "printing" %}
        RESPOND TYPE=error MSG="Cannot exchange during print — use M600 for mid-print changes"
    {% else %}
        {% set current_temp = printer.extruder.temperature|float %}
        RESPOND TYPE=command MSG="action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_begin Exchange Filament"
        RESPOND TYPE=command MSG="action:prompt_text What are you loading NEXT?"
        RESPOND TYPE=command MSG="action:prompt_text Current extruder: {current_temp|int}C"
        RESPOND TYPE=command MSG="action:prompt_button ABS / ASA (255C)|_EXCHANGE_START TEMP=255|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG (230C)|_EXCHANGE_START TEMP=230|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PLA (215C)|_EXCHANGE_START TEMP=215|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PA / PA-CF (275C)|_EXCHANGE_START TEMP=275|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PC (275C)|_EXCHANGE_START TEMP=275|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_FILAMENT_CANCEL_PROMPT|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _EXCHANGE_START]
description: Heat, unload old filament, wait for sensor clear, prompt to insert new
gcode:
    {% set temp = params.TEMP|int %}
    # Park toolhead at front for easy access (homes if needed)
    MAINTENANCE_POSITION POS=nozzle
    {% set target = printer.extruder.target|float %}
    {% if target|int > temp %}
        {% set use_temp = target|int %}
    {% else %}
        {% set use_temp = temp %}
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_end"
    # Hotend-aware retract distances (CAD-verified: printers/v24/schematics/Hotends/)
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
    {% if hotend == "rapido_uhf" %}
        {% set cool_retract = 30 %}
        {% set final_retract = 30 %}
    {% elif hotend == "raptor" %}
        {% set cool_retract = 23 %}
        {% set final_retract = 45 %}
    {% else %}
        {% set cool_retract = 30 %}
        {% set final_retract = 35 %}
    {% endif %}
    # Heat if needed
    {% if not printer.extruder.can_extrude or printer.extruder.temperature < (use_temp - 10) %}
        RESPOND MSG="Heating to {use_temp}C..."
        M117 Heating to {use_temp}C...
        M104 S{use_temp}
        M109 S{use_temp}
        M117
    {% else %}
        M104 S{use_temp}
    {% endif %}
    # Unload old filament
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=1
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
    UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=60
    SAVE_GCODE_STATE NAME=exchange_unload
    M83
    G1 E3 F3600
    G1 E-3 F3600
    G1 E2 F1800
    G1 E-{cool_retract} F600
    G4 P1500
    G1 E-{final_retract} F600
    RESTORE_GCODE_STATE NAME=exchange_unload
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
    UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
    RESPOND MSG="Retract done — checking sensor..."
    # Wait for moves to complete, then check sensor
    M400
    _EXCHANGE_CHECK_CLEAR TEMP={temp}

[gcode_macro _EXCHANGE_CHECK_CLEAR]
description: After unload — check sensor, prompt to remove old filament or proceed
gcode:
    {% set temp = params.TEMP|int %}
    {% if printer["filament_switch_sensor toolhead_filament_sensor"].filament_detected %}
        # Filament still in sensor — prompt user to pull it out
        RESPOND TYPE=command MSG="action:prompt_begin Remove Old Filament"
        RESPOND TYPE=command MSG="action:prompt_text Filament still detected in sensor."
        RESPOND TYPE=command MSG="action:prompt_text Pull the old filament out from the top."
        RESPOND TYPE=command MSG="action:prompt_footer_button Done — Check Again|_EXCHANGE_CHECK_CLEAR TEMP={temp}|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_FILAMENT_CANCEL_PROMPT|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        # Sensor clear — prompt to insert new filament
        RESPOND MSG="Old filament removed"
        RESPOND TYPE=command MSG="action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_begin Insert New Filament"
        RESPOND TYPE=command MSG="action:prompt_text Old filament removed successfully."
        RESPOND TYPE=command MSG="action:prompt_text Insert new filament into extruder."
        RESPOND TYPE=command MSG="action:prompt_footer_button Load|_EXCHANGE_LOAD TEMP={temp}|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_FILAMENT_CANCEL_PROMPT|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _EXCHANGE_LOAD]
description: Load new filament during exchange, then purge check
gcode:
    {% set temp = params.TEMP|int %}
    RESPOND TYPE=command MSG="action:prompt_end"
    # Ensure at correct temp for new material
    {% set current = printer.extruder.temperature|float %}
    {% if current < (temp - 5) %}
        RESPOND MSG="Adjusting temp to {temp}C for new material..."
        M104 S{temp}
        M109 S{temp}
    {% elif not printer.extruder.can_extrude %}
        M104 S{temp}
        M109 S{temp}
    {% else %}
        M104 S{temp}
    {% endif %}
    # Hotend-aware load distances
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
    {% if hotend == "rapido_uhf" %}
        {% set feed = 85 %}
        {% set purge = 30 %}
    {% elif hotend == "raptor" %}
        {% set feed = 80 %}
        {% set purge = 25 %}
    {% else %}
        {% set feed = 75 %}
        {% set purge = 25 %}
    {% endif %}
    # Load new filament
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=1
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
    UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=60
    SAVE_GCODE_STATE NAME=exchange_load
    M83
    G1 E{feed} F600
    G1 E{purge} F200
    RESTORE_GCODE_STATE NAME=exchange_load
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
    UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0
    SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
    RESPOND MSG="New filament loaded"
    # Purge check (shares standalone purge loop → park choice)
    RESPOND TYPE=command MSG="action:prompt_begin Purge Check"
    RESPOND TYPE=command MSG="action:prompt_text Is the color clean?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Done|_FILAMENT_LOAD_DONE|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Purge More|_FILAMENT_PURGE_MORE|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"

#####################################################################
#   M600 — Mid-print filament change with cooldown timer
#####################################################################

[gcode_macro M600]
description: Mid-print filament change — pause, unload, prompt, load, resume
gcode:
    {% set state = printer.print_stats.state %}
    {% if state != "printing" and state != "paused" %}
        RESPOND TYPE=error MSG="M600: Not printing. Use EXCHANGE_FILAMENT instead."
    {% elif not printer.extruder.can_extrude %}
        RESPOND TYPE=error MSG="M600: Extruder too cold! Cannot unload."
    {% else %}
        PAUSE
        UNLOAD_FILAMENT
        # Start 10-minute cooldown timer
        UPDATE_DELAYED_GCODE ID=_M600_COOLDOWN DURATION=600
        # Show dialog
        RESPOND TYPE=command MSG="action:prompt_begin Filament Change (M600)"
        RESPOND TYPE=command MSG="action:prompt_text Filament has been unloaded."
        RESPOND TYPE=command MSG="action:prompt_text Insert new filament into extruder."
        RESPOND TYPE=command MSG="action:prompt_text Hotend will cool down in 10 min if idle."
        RESPOND TYPE=command MSG="action:prompt_footer_button Load Filament|_M600_LOAD|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|_M600_CANCEL|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[delayed_gcode _M600_COOLDOWN]
initial_duration: 0
gcode:
    M104 S0
    RESPOND MSG="M600: Hotend cooled down (10 min idle). Will reheat on Load."

[gcode_macro _M600_LOAD]
description: M600 helper — cancel timer, load filament, prompt color check
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    UPDATE_DELAYED_GCODE ID=_M600_COOLDOWN DURATION=0
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=command MSG="action:prompt_begin Reheat for Load"
        RESPOND TYPE=command MSG="action:prompt_text Hotend cooled down. Select material to reheat:"
        RESPOND TYPE=command MSG="action:prompt_button ABS / ASA (255C)|_M600_HEAT_AND_LOAD TEMP=255|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG (230C)|_M600_HEAT_AND_LOAD TEMP=230|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PLA (215C)|_M600_HEAT_AND_LOAD TEMP=215|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PA / PA-CF (275C)|_M600_HEAT_AND_LOAD TEMP=275|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PC (275C)|_M600_HEAT_AND_LOAD TEMP=275|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|_M600_CANCEL|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        {% set svv = printer.save_variables.variables %}
        {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
        {% if hotend == "rapido_uhf" %}
            {% set feed = 85 %}
            {% set purge = 30 %}
        {% elif hotend == "raptor" %}
            {% set feed = 80 %}
            {% set purge = 25 %}
        {% else %}
            {% set feed = 75 %}
            {% set purge = 25 %}
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=1
        SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
        UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=60
        SAVE_GCODE_STATE NAME=m600_load
        M83
        G1 E{feed} F600
        G1 E{purge} F200
        RESTORE_GCODE_STATE NAME=m600_load
        SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
        UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0
        SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
        RESPOND TYPE=command MSG="action:prompt_begin Purge Check"
        RESPOND TYPE=command MSG="action:prompt_text Is the color clean?"
        RESPOND TYPE=command MSG="action:prompt_footer_button Resume Print|_M600_RESUME|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Purge More|_M600_PURGE|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|_M600_CANCEL|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _M600_HEAT_AND_LOAD]
description: M600 helper — reheat after cooldown, then load
gcode:
    {% set temp = params.TEMP|int %}
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Reheating to {temp}C..."
    M117 Reheating to {temp}C...
    M104 S{temp}
    M109 S{temp}
    M117
    _M600_LOAD

[gcode_macro _M600_PURGE]
description: M600 helper — purge more filament
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=command MSG="action:prompt_begin Reheat Needed"
        RESPOND TYPE=command MSG="action:prompt_text Hotend cooled down. Select material to reheat:"
        RESPOND TYPE=command MSG="action:prompt_button ABS / ASA (255C)|_M600_HEAT_AND_LOAD TEMP=255|primary"
        RESPOND TYPE=command MSG="action:prompt_button PETG (230C)|_M600_HEAT_AND_LOAD TEMP=230|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PLA (215C)|_M600_HEAT_AND_LOAD TEMP=215|secondary"
        RESPOND TYPE=command MSG="action:prompt_button PA / PA-CF (275C)|_M600_HEAT_AND_LOAD TEMP=275|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|_M600_CANCEL|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% else %}
        {% set svv = printer.save_variables.variables %}
        {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
        {% if hotend == "rapido_uhf" %}
            {% set purge = 30 %}
        {% else %}
            {% set purge = 25 %}
        {% endif %}
        SAVE_GCODE_STATE NAME=m600_purge
        M83
        G1 E{purge} F200
        RESTORE_GCODE_STATE NAME=m600_purge
        RESPOND TYPE=command MSG="action:prompt_begin Purge Check"
        RESPOND TYPE=command MSG="action:prompt_text Is the color clean now?"
        RESPOND TYPE=command MSG="action:prompt_footer_button Resume Print|_M600_RESUME|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Purge More|_M600_PURGE|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|_M600_CANCEL|error"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _M600_RESUME]
description: M600 helper — resume print
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    UPDATE_DELAYED_GCODE ID=_M600_COOLDOWN DURATION=0
    RESUME

[gcode_macro _M600_CANCEL]
description: M600 helper — clean up then cancel print
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    UPDATE_DELAYED_GCODE ID=_M600_COOLDOWN DURATION=0
    CANCEL_PRINT

#####################################################################
#   Sensor event handlers — ADVISORY ONLY
#####################################################################

[gcode_macro _FILAMENT_INSERT_HANDLER]
description: Sensor insert event — context-dependent prompt or message
gcode:
    {% set state = printer.print_stats.state %}
    {% set loading = printer["gcode_macro _FILAMENT_STATE"].loading %}
    {% if loading == 1 %}
        # Load/unload in progress — silently ignore
    {% elif state == "printing" %}
        RESPOND MSG="Filament detected"
    {% elif state == "paused" %}
        RESPOND MSG="Filament detected. Use dialog or LOAD_FILAMENT when ready."
    {% else %}
        # Idle — offer to load
        RESPOND TYPE=command MSG="action:prompt_end"
        RESPOND TYPE=command MSG="action:prompt_begin Filament Detected"
        RESPOND TYPE=command MSG="action:prompt_text Filament sensor triggered. Load filament?"
        RESPOND TYPE=command MSG="action:prompt_footer_button Load Filament|LOAD_FILAMENT|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Dismiss|_FILAMENT_CANCEL_PROMPT|secondary"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

#####################################################################
#   Sensor print-mode hooks (called by Mainsail _CLIENT_VARIABLE)
#####################################################################

[gcode_macro _SENSOR_DISABLE_FOR_PRINT]
description: Disable filament sensor for active printing (called by RESUME hook)
gcode:
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
    UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0

[gcode_macro _SENSOR_ENABLE_AFTER_PRINT]
description: Re-enable filament sensor after print ends (called by CANCEL_PRINT hook)
gcode:
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
    UPDATE_DELAYED_GCODE ID=_SENSOR_REENABLE DURATION=0

[gcode_macro _CANCEL_PRINT_CLEANUP]
description: CANCEL_PRINT hook — tip form + re-enable sensor (via _CLIENT_VARIABLE)
gcode:
    _FILAMENT_TIP_FORM
    _SENSOR_ENABLE_AFTER_PRINT

#####################################################################
#   Sensor safety net — re-enable if macro crashes
#####################################################################

[delayed_gcode _SENSOR_REENABLE]
initial_duration: 0
gcode:
    {% set state = printer.print_stats.state %}
    {% if state == "printing" %}
        # Mid-print: keep sensor disabled to prevent false runout
        SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
        RESPOND MSG="Filament sensor safety timeout (kept disabled — print active)"
    {% else %}
        SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1
        SET_GCODE_VARIABLE MACRO=_FILAMENT_STATE VARIABLE=loading VALUE=0
        RESPOND MSG="Filament sensor re-enabled (safety timeout)"
    {% endif %}
