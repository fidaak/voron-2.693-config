# This file contains common pin mappings for the BigTreeTech OctoPus V1.
# To use this config, the firmware should be compiled for the STM32F446 with a "32KiB bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference

# after running "make", copy the generated "klipper/out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the OctoPus with that SD card.

# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON2 250/300/350mm BigTreeTech OctoPus V1 TMC2209 UART config

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths							[mcu] section
## Thermistor types						[extruder] and [heater_bed] sections - See 'sensor types' list at end of file
## Z Endstop Switch location			[safe_z_home] section
## Homing end position				[gcode_macro G32] section
## Z Endstop Switch  offset for Z0		[stepper_z] section
## Probe points							[quad_gantry_level] section
## Min & Max gantry corner postions		[quad_gantry_level] section
## PID tune								[extruder] and [heater_bed] sections
## Probe pin								[probe] section
## Fine tune E steps					[extruder] section

[mcu rpi]
serial: /tmp/klipper_host_mcu

[mcu sht36v2]
canbus_uuid:  9135866f5bf2

#[adxl345 voronMount]
#axes_map: z, y, x
#cs_pin: rpi:None

[adxl345 sht36v2]
axes_map: x, z, y

cs_pin: sht36v2:PA9
spi_bus = spi2

[angle extruder_stepper]
sensor_type: as5047d
sample_period: 0.000400
stepper: extruder
cs_pin: sht36v2:PC14
spi_bus = spi1 

[resonance_tester]
accel_chip: adxl345 sht36v2
probe_points:
    #150,150,20  # an example
    150,150,100
    #150,150,200

[mcu]
##	[X in MOTOR0] - B Motor
##	[Y in MOTOR1] - A Motor
##	[E in MOTOR6] - Extruder
##	Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_0F002E000550534E4E313020-if00
#restart_method: command
##--------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 800  
max_accel: 15000   			#Tested 18000, shaper quality limit 5510/8840
max_z_velocity: 100 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 1000
square_corner_velocity: 8.0

[input_shaper]
#shaper_freq_x: 56.0
#shaper_type_x: zv
#shaper_freq_y: 45.0
#shaper_type_y: zv

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on MOTOR0(B Motor)
[stepper_x]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
#endstop_pin: PG6
endstop_pin: sht36v2:PA2
position_min: 0
##--------------------------------------------------------------------

##	Uncomment below for 250mm build
#position_endstop: 250
#position_max: 250

#	Uncomment for 300mm build
position_endstop: 303
position_max: 303

##	Uncomment for 350mm build
#position_endstop: 350
#position_max: 350

##--------------------------------------------------------------------
homing_speed: 100   #Max 100
second_homing_speed: 10
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PC4
interpolate: True
run_current: 1.1
#hold_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

## Y Stepper on MOTOR1 (A Motor)
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: PG9
position_min: 0
##--------------------------------------------------------------------

##	Uncomment for 250mm build
#position_endstop: 250
#position_max: 250

#	Uncomment for 300mm build
position_endstop: 308
position_max: 308

##	Uncomment for 350mm build
#position_endstop: 350
#position_max: 350

##--------------------------------------------------------------------
homing_speed: 100  #Max 100
second_homing_speed: 10
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PD11
interpolate: True
run_current: 1.1
#hold_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0
 
#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR2_1
[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: PG10
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##	Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5
##--------------------------------------------------------------------

##	Uncomment below for 250mm build
#position_max: 240

#	Uncomment below for 300mm build
position_max: 260
position_min: -5.0

##	Uncomment below for 350mm build
#position_max: 340

##--------------------------------------------------------------------
#position_min: -5
position_endstop: 8
homing_speed: 15
second_homing_speed: 3
homing_retract_dist: 2

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PC6
interpolate: true
run_current: 1.0
#hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z1 Stepper - Rear Left on MOTOR3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: true
run_current: 1.0
#hold_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z2 Stepper - Rear Right on MOTOR4
[stepper_z2]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: true
run_current: 1.0
#hold_current: 0.80
sense_resistor: 0.110
stealthchop_threshold: 0

##	Z3 Stepper - Front Right on MOTOR5
[stepper_z3]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: true
run_current: 1.0
#hold_current: 0.80
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
# 	Extruder
#####################################################################

#	E0 on MOTOR6
[extruder]
step_pin: sht36v2:PB4
dir_pin: sht36v2:PB3
enable_pin: !sht36v2:PA15
##	Update value below when you perform extruder calibration
##	If you ask for 100mm of filament, but in reality it is 98mm:
##	rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
#rotation_distance: 22.6789511	#Bondtech 5mm Drive Gears
#rotation_distance: 34.2033658	#Bondtech 8mm Drive Gears
rotation_distance: 4.637	#Orbiter v2
##	Update Gear Ratio depending on your Extruder Type
##	Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##	Use 80:20 for M4, M3.1
#gear_ratio: 50:17				#BMG Gear Ratio
#gear_ratio: 7.5:1              #Galileo Gear Ratio
microsteps: 16
full_steps_per_rotation: 200	#200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: sht36v2:PA8
##	Validate the following thermistor type to make sure it is correct
#sensor_type: Generic 3950
#sensor_pin: PF4
#min_temp: 10
#max_temp: 350
#max_power: 1.0



sensor_type: MAX31865
sensor_pin: sht36v2:PB12
spi_bus = spi2
# spi_software_sclk_pin: sht36v2:PB13
# spi_software_mosi_pin: sht36v2:PB15
# spi_software_miso_pin: sht36v2:PB14
min_temp: -50
max_temp: 500
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 4
rtd_use_50Hz_filter: True
min_extrude_temp: 170

# PID VALUES Dragon HF
control = pid
pid_kp = 27.020
pid_ki = 1.857
pid_kd = 98.288

## PID VALUES Raptor Protoprint
# control = pid
# pid_kp = 48.060
# pid_ki = 10.335
# pid_kd = 55.872

# PID VALUES Rapido
#control = pid
#pid_kp = 19.024
#pid_ki = 1.379
#pid_kd = 65.636

# PID VALUES Rapido UHF
#control = pid
#pid_kp = 22.856
#pid_ki = 1.656
#pid_kd = 78.856

##	Try to keep pressure_advance below 1.0
pressure_advance: 0.045
##	Default is 0.040, leave stock
pressure_advance_smooth_time: 0.04

max_extrude_cross_section: 10.0

max_extrude_only_distance: 600.0

max_extrude_only_velocity: 120
max_extrude_only_accel: 8000

min_extrude_temp: 170


##	E0 on MOTOR6
##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 extruder]
uart_pin: sht36v2:PB5
#diag_pin: sht36v2:PB6
interpolate: false
#run_current: 0.5
#hold_current: 0.4

run_current: 0.95
#hold_current: 0.100

sense_resistor: 0.110
stealthchop_threshold: 0

driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4


#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
##	SSR Pin - BED_OUT
heater_pin: PA3
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF3
##	Adjust Max Power so your heater doesn't warp your bed
max_power: 1.0
min_temp: 10
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
# 	Probe
#####################################################################

[probe]
##	Inductive Probe
##	This probe is not used for Z height, only Quad Gantry Leveling

# Select the probe port by type:
## For the PROBE port; use this with the original OMRON sensor.
#pin: ^PG15
pin: ^sht36v2:PA1
## For the spare endstop port; use this with the Fotek PL-05N (or generic) inductive probe
# pin: ^PG11
## For Octopus Pro Probe port; NPN and PNP proximity switch types can be set by jumper
# pin: ^PC5

#--------------------------------------------------------------------

z_offset: 6.42
x_offset: 0 
y_offset: 19.75
speed: 15.0
samples: 5
samples_result: median
sample_retract_dist: 2
samples_tolerance: 0.02
samples_tolerance_retries: 3

[filament_switch_sensor toolhead_filament_sensor]
pause_on_runout: True
runout_gcode:
    RESPOND TYPE=error MSG="Filament runout! Print paused."
    RESPOND TYPE=command MSG="action:prompt_begin Filament Runout"
    RESPOND TYPE=command MSG="action:prompt_text Filament ran out. Insert new filament."
    RESPOND TYPE=command MSG="action:prompt_footer_button Load Filament|LOAD_FILAMENT|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel Print|CANCEL_PRINT|error"
    RESPOND TYPE=command MSG="action:prompt_show"
insert_gcode:
    _FILAMENT_INSERT_HANDLER
event_delay: 3.0
pause_delay: 0.5
switch_pin: ^!sht36v2:PC15

#[gcode_button unload_filament_button]
#pin: !sht36v2:PC15
#   The pin on which the button is connected. This parameter must be
#   provided.
#analog_range:
#   Two comma separated resistances (in Ohms) specifying the minimum
#   and maximum resistance range for the button. If analog_range is
#   provided then the pin must be an analog capable pin. The default
#   is to use digital gpio for the button.
#analog_pullup_resistor:
#   The pullup resistance (in Ohms) when analog_range is specified.
#   The default is 4700 ohms.
#press_gcode:
#    FORCE_MOVE STEPPER=extruder DISTANCE=-100 VELOCITY=30 ACCEL=5000
#   A list of G-Code commands to execute when the button is pressed.
#   G-Code templates are supported. This parameter must be provided.
#release_gcode:
#   A list of G-Code commands to execute when the button is released.
#   G-Code templates are supported. The default is to not run any
#   commands on a button release.

#####################################################################
# 	Fan Control
#####################################################################

[fan]
##	Print Cooling Fan - CNC_FAN0
pin: sht36v2:PB10
kick_start_time: 0.2
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
off_below: 0.11

[heater_fan hotend_fan]
##	Hotend Fan - CNC_FAN1
pin: sht36v2:PB11
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
##	If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0

[temperature_fan SHT36_fan]
##	SHT36v2 board cooling fan — PID controlled by MCU die temperature
##	Small 20x20x7 fan blowing on SHT36v2 board and extruder stepper
pin: PA8
max_power: 1.0
kick_start_time: 0.5
max_speed: 1.0
min_speed: 0.2
pid_deriv_time: 2.0
control: pid
pid_Kp: 2.975
pid_Ki: 0
pid_Kd: 0
min_temp: -5
max_temp: 120
#heater: extruder
#heater_temp: 50.0
##	If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0
sensor_type: temperature_mcu
sensor_mcu: sht36v2
sensor_temperature1: 28.8
sensor_adc1: 0.423474
sensor_temperature2: 57.0
sensor_adc2: 0.365201
target_temp: 100.0

[heater_fan controller_fan]
##	Controller fan - CNC_FAN2
pin: PD12
max_power: 1.0
kick_start_time: 0.5
heater: heater_bed
heater_temp: 40
fan_speed: 0.75

[fan_generic exhaust_fan]
#	Exhaust fan - CNC_FAN3
pin: PD13
max_power: 1.0
#shutdown_speed: 0.0
kick_start_time: 1.0
#heater: heater_bed
#heater_temp: 80
#fan_speed: 1.0
cycle_time: 0.040

[fan_generic nevermore_fan]
#	Exhaust fan - CNC_FAN3
pin: PD14
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.2
#heater: heater_bed
#heater_temp: 80
#fan_speed: 1.0

## FLY-SHT36v2 MCU die temp — now used by [temperature_fan SHT36_fan] above
#[temperature_sensor FLY-SHT36v2]
#sensor_type: temperature_mcu
#sensor_mcu: sht36v2
#sensor_temperature1: 28.8
#sensor_adc1: 0.423474
#sensor_temperature2: 57.0
#sensor_adc2: 0.365201

[temperature_sensor toolhead_temp]
## External NTC on sht36v2 TH1 — reads toolhead ambient air (~30°C at idle)
## Placement TBD — wire tracing needed
sensor_type = ATC Semitec 104GT-2
sensor_pin = sht36v2:PA4
min_temp: -50
max_temp: 350

[temperature_sensor toolhead_external]
## External NTC on sht36v2 TH0 — reads toolhead ambient air (~24°C at idle, noisy ±0.5°C)
## Placement TBD — wire tracing needed. Originally named "Stepper".
sensor_type: Generic 3950
sensor_pin: sht36v2:PA3
min_temp: -10
max_temp: 120

[thermistor chamber_10k_3950]
temperature1: 25
resistance1: 10000
beta: 3950

[temperature_sensor chamber_temp]
## Chamber ambient temperature — 10K B3950 NTC on Octopus PF4
sensor_type: chamber_10k_3950
sensor_pin: PF4
min_temp: -10
max_temp: 120

#[temperature_sensor raspberry_pi]
#sensor_type: temperature_host
#min_temp: 10
#max_temp: 100

