#####################################################################
# 	Macros
#####################################################################

[gcode_macro CHAMBER_FANS]
gcode:
    {% set HEATER_TARGET = params.HEATER_TARGET|default(65)|float %}
    {% set FAN_TARGET = params.FAN_TARGET|default(75)|float %}
    {% set FAN_SPEED = params.FAN_SPEED|default(1)|float %}
    
    {% if HEATER_TARGET >= FAN_TARGET %}
        SET_FAN_SPEED FAN=nevermore_fan SPEED={FAN_SPEED} ; Recirculate & filter during print
        SET_FAN_SPEED FAN=exhaust_fan SPEED=0             ; Keep chamber heat IN
    {% else %}
        SET_FAN_SPEED FAN=nevermore_fan SPEED=0
        SET_FAN_SPEED FAN=exhaust_fan SPEED={FAN_SPEED}   ; Evacuate fumes after print
    {% endif %}

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28 X Y
    Attach_Probe_Lock
    G28 Z
    QUAD_GANTRY_LEVEL
    G28
    _Probe_Unlock
    Dock_Probe
    G0 X150 Y150 Z30 F3600
    STATUS_READY
   
[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    # Parameters
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.HOTEND|int %}
    {% set chambertemp = params.CHAMBER|default(0)|int %}

    # Disable filament sensor for entire PRINT_START — toolhead vibration causes false runouts
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0

    #M104 S{hotendtemp} ; set extruder temp
    STATUS_READY
    CHAMBER_FANS HEATER_TARGET={bedtemp} FAN_TARGET=75
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=160        ; set extruder temp to 160 for QGL w/o oozing
    M140 S{bedtemp} ; set bed temp
    #TEMPERATURE_WAIT SENSOR="temperature_sensor enclosure_temp" MINIMUM={chambertemp}   ; wait for chamber temp
    BED_MESH_CLEAR
    G28 X Y
    Attach_Probe_Lock
    G28 Z
    #CLEAN_NOZZLE                                                                        ; clean the nozzle but do not purge
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bedtemp}         ; wait for bed temp         
    #M190 S{bedtemp}                                                                     ; wait for bed temp
    _Probe_Unlock
    #M104 S{hotendtemp} ; set extruder temp
    QUAD_GANTRY_LEVEL
    G28 X Y                                                                                ; Tram up the build plate
    #BED_MESH_CALIBRATE                                                                  ; create a fresh bed mesh
    #BED_MESH_PROFILE LOAD=steelSheet2PEI-110deg-230116-signLeft-2                           ; load default mesh
    BED_MESH_PROFILE LOAD=magneticSheet_110Deg_230109_1
    M109 S{hotendtemp}                                                                  ; wait for hotend temp
    CLEAN_NOZZLE                                                                        ; clean the nozzle but do not purge

    # Anti-ooze: form tip + retract before Z calibration
    _FILAMENT_TIP_FORM

    CALIBRATE_Z                                                                         ; Z offset with clean dry nozzle

    # Re-prime: push filament back to nozzle (hotend-aware, matches _FILAMENT_TIP_FORM retract)
    # Reprime = cool_retract - 2mm margin (purge line handles the last bit)
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
    # Reprime = cool_retract - 2mm margin (Dragon HF/Rapido: 28mm, Raptor: 21mm)
    {% if hotend == "rapido_uhf" %}
        {% set reprime = 28 %}
    {% elif hotend == "raptor" %}
        {% set reprime = 21 %}
    {% else %}
        {% set reprime = 28 %}
    {% endif %}
    SAVE_GCODE_STATE NAME=reprime
    M83
    G1 E{reprime} F600               ; push back toward melt zone (leave 2mm margin, purge line handles rest)
    RESTORE_GCODE_STATE NAME=reprime

    G1 X2 Y2 F19500.0              ; Move to start position
    PURGE_LINE

[gcode_macro PURGE_LINE]
gcode:
    G92 E0                               ; Reset Extruder
    G1 X2 Y2 Z0.25 F19500.0              ; Move to start position
    G1 X250 Y2 Z0.25 F1500.0 E35        ; Draw the first line
    G92 E0                               ; Reset Extruder
    G1 Z2.0 F3000

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script
gcode:
    M400                           ; wait for buffer to clear
    # Calculate safe Z lift (handle tall prints near Z max)
    {% set z_current = printer.toolhead.position.z|float %}
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_lift = [20, z_max - z_current]|min %}
    # Quick retract to relieve nozzle pressure — do NOT tip-form on the print!
    G92 E0
    G1 E-2 F3600                   ; fast retract to stop ooze
    # Lift 20mm above print, move to back-right above purge bucket
    G91                            ; relative positioning
    G0 Z{z_lift} F3000             ; lift nozzle clear of print
    G90                            ; absolute positioning
    G0 X250 Y308 F18000            ; park back-right above purge bucket
    # NOW tip forming is safe — nozzle is clear of the model
    _FILAMENT_TIP_FORM
    TURN_OFF_HEATERS
    M107                           ; turn off part cooling fan
    BED_MESH_CLEAR
    CHAMBER_FANS HEATER_TARGET=0 FAN_TARGET=75
    STATUS_READY
    RESPOND MSG="Print complete — filament parked in heatbreak"
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1    ; re-enable sensor after print

# Convert Marlin linear advance (M900) commands to Klipper (SET_PRESSURE_ADVANCE) commands.
# For use with Marlin's linear advance calibration: https://marlinfw.org/tools/lin_advance/k-factor.html
[gcode_macro M900]
gcode:
	# Parameters
	{% set pa = params.K|float %}
	SET_PRESSURE_ADVANCE ADVANCE={pa}

# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10
[gcode_macro TEST_SPEED]
gcode:
	# Speed
	{% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
	# Iterations
	{% set iterations = params.ITERATIONS|default(5)|int %}
	# Acceleration
	{% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
	# Bounding box (in case the machine min/maxes are not perfect)
	{% set bound = params.BOUND|default(30)|int %}
	
	# Set speed test bounds (machine minimum/maximum positions, inset by the bounding box)
	{% set x_min = printer.toolhead.axis_minimum.x + bound %}
	{% set x_max = printer.toolhead.axis_maximum.x - bound %}
	{% set y_min = printer.toolhead.axis_minimum.y + bound %}
	{% set y_max = printer.toolhead.axis_maximum.y - bound %}

	# Save current gcode state (absolute/relative, etc)
	SAVE_GCODE_STATE NAME=TEST_SPEED
	
	# Absolute positioning
	G90
	
	# Set new limits
	SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO=0.5

	# Home and get position for comparison later:
		G28 X Y
        Attach_Probe_Lock
        G28 Z
        Dock_Probe_Unlock
		# QGL if not already QGLd (only if QGL section exists in config)
		{% if printer.configfile.settings.quad_gantry_level %}
			{% if printer.quad_gantry_level.applied == False %}
				QUAD_GANTRY_LEVEL
				Attach_Probe_Lock
                G28 Z
                Dock_Probe_Unlock
			{% endif %}
		{% endif %}	
		G0 X{printer.toolhead.axis_maximum.x} Y{printer.toolhead.axis_maximum.y} F{30 * 60}
		G4 P1000 
		GET_POSITION

	# Go to starting position
	G0 X{x_min} Y{y_min} Z{bound + 10} F{speed * 60}

	{% for i in range(iterations) %}
		# Diagonals
		G0 X{x_min} Y{y_min} F{speed * 60}
		G0 X{x_max} Y{y_max} F{speed * 60}
		G0 X{x_min} Y{y_min} F{speed * 60}
		G0 X{x_max} Y{y_min} F{speed * 60}
		G0 X{x_min} Y{y_max} F{speed * 60}
		G0 X{x_max} Y{y_min} F{speed * 60}
		
		# Box
		G0 X{x_min} Y{y_min} F{speed * 60}
		G0 X{x_min} Y{y_max} F{speed * 60}
		G0 X{x_max} Y{y_max} F{speed * 60}
		G0 X{x_max} Y{y_min} F{speed * 60}
	{% endfor %}

	# Restore max speed/accel/minimum_cruise_ratio to their configured values
	SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}

	# Re-home XY and get position again for comparison:
		G28 X Y
		# Go to XY home positions (in case your homing override leaves it elsewhere)
		G0 X{printer.toolhead.axis_maximum.x} Y{printer.toolhead.axis_maximum.y} F{30 * 60}
		G4 P1000 
		GET_POSITION

	# Restore previous gcode state (absolute/relative, etc)
	RESTORE_GCODE_STATE NAME=TEST_SPEED

