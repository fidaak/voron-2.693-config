##############################################################################
#
# Silicone Nozzle Wiper Cleaning Macro — Voron V2.4 300mm
#
# Adapted from jinetix "Voron 2.4 Silicone Nozzle Scrubber" (Printables 796563)
# for use with Bambu A1 silicone wiper on existing Decontaminator bucket bracket.
#
# Two-phase cleaning:
#   Phase 1 — In-out flicking: nozzle enters brush from the right side,
#             dips into bristles, snaps back. Dislodges large blobs.
#   Phase 2 — Circular scrubbing: G2/G3 arcs across brush width.
#             Forces bristles in all directions for deep clean.
#
# REQUIRES: [gcode_arcs] in printer.cfg (resolution: 0.1)
#
# Physical layout (rear of bed, looking from front):
#   X160-X200: purge bucket (left)
#   X207-X244: silicone wiper (37mm Bambu A1)
#   X244-X260: cleared area (right bed screw removed)
#   Left bed screw still present — always clear Z for long XY travel.
#
##############################################################################

[gcode_macro clean_nozzle]

# === SILICONE WIPER POSITION ===
# Reference point: top-left corner of Bambu A1 silicone wiper.
# To recalibrate: jog nozzle above top-left corner, read X/Y, update these.
variable_brush_ref_x:       207.0    ; X of left edge of brush
variable_brush_ref_y:       307.0    ; Y of rear edge of brush
variable_brush_width:        37.0    ; Brush width (X direction, toward right)
variable_brush_depth:         8.0    ; Brush depth (Y direction, toward front)

# === FLICK HOME / BUCKET POSITION ===
# To the RIGHT of the brush (bed screw removed on this side).
# Nozzle parks here between flicks and debris falls into this area.
variable_bucket_offset:      10.0    ; Distance right of brush right edge

# === Z HEIGHTS ===
# clean_z: Absolute Z height for nozzle during cleaning.
#   Calibrate: home, jog to brush center (X225 Y303), lower Z until bristles
#   just deflect. Record that Z value here.
variable_clean_z:            -0.25   ; Nozzle Z during cleaning (conservative — reprint holder taller if needed)
variable_flick_z_dip:         0.25   ; Extra Z dip below clean_z during flick (limited — Stealthburner clearance)
variable_exit_z_lift:         3.0    ; Z lift after cleaning
variable_clearance_z:        10.0    ; Safe Z above clean_z for long-range XY travel

# === PURGE (disabled — bucket still physically present on left side) ===
variable_enable_purge:       False
variable_purge_len:           20     ; mm of filament to extrude
variable_purge_spd:         1000     ; mm/min extrusion speed
variable_purge_temp_min:     225     ; min temp to allow purge
variable_purge_ret:            5     ; mm retract after purge
variable_ooze_dwell:           2     ; seconds to wait after purge

# === FLICKING (Phase 1) ===
# Nozzle at flick home (right of brush), pushes LEFT into brush, snaps back RIGHT.
variable_flick_count:          5     ; Number of in-out flick cycles
variable_flick_depth:          3.0   ; How far into brush from right edge (mm)
variable_flick_dwell_ms:      20     ; Dwell at deepest point (bristles grip debris)
variable_flick_return_mult:    1.5   ; Return speed multiplier (snap-back effect)

# === CIRCULAR SCRUB (Phase 2) ===
# G2/G3 arcs stepped across brush width. Requires [gcode_arcs].
variable_scrub_passes:         5     ; Number of positions across brush
variable_circles_per_pass:     2     ; Full circles per position
variable_circle_radius:        2.0   ; Arc radius (mm)
variable_alternate_direction: True   ; Alternate CW/CCW between positions

# === SPEEDS (mm/min) ===
variable_travel_spd_xy:     9000
variable_travel_spd_z:      1500
variable_flick_spd:         9000
variable_scrub_spd:         3000

# Internal placeholder
variable_bucket_pos:           1

gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}

        SAVE_GCODE_STATE NAME=clean_nozzle
        G90

        # --- Compute derived positions ---
        {% set bx_right  = brush_ref_x + brush_width %}
        {% set bucket_x  = bx_right + bucket_offset %}
        {% set flick_x   = bx_right - flick_depth %}
        {% set cy        = brush_ref_y - (brush_depth / 2.0) %}
        {% set cx        = brush_ref_x + (brush_width / 2.0) %}
        {% set safe_z    = clean_z + clearance_z %}
        {% set usable_w  = brush_width - (circle_radius * 2) %}
        {% set return_spd = (flick_spd * flick_return_mult)|int %}

        # Scrub stepping
        {% if scrub_passes > 1 %}
            {% set step    = usable_w / (scrub_passes - 1) %}
            {% set start_x = cx - (usable_w / 2) %}
        {% else %}
            {% set step    = 0 %}
            {% set start_x = cx %}
        {% endif %}

        # --- Approach: raise Z, travel to flick home, lower ---
        G1 Z{safe_z} F{travel_spd_z}
        G1 X{bucket_x} Y{cy} F{travel_spd_xy}

        # --- Optional purge ---
        {% if enable_purge %}
            {% if printer.extruder.temperature >= purge_temp_min %}
                M83
                G1 E{purge_len} F{purge_spd}
                G1 E-{purge_ret} F{purge_spd * 5}
                G4 P{(ooze_dwell * 1000)|int}
                G92 E0
            {% endif %}
        {% endif %}

        # Lower to cleaning height
        G1 Z{clean_z} F{travel_spd_z}

        # --- Phase 1: In-out flicking ---
        # Nozzle at bucket_x, pushes LEFT into brush edge, snaps back RIGHT
        {% for i in range(flick_count) %}
            G1 Z{clean_z - flick_z_dip} F{travel_spd_z}
            G1 X{flick_x} F{flick_spd}
            G4 P{flick_dwell_ms|int}
            G1 X{bucket_x} F{return_spd}
            G1 Z{clean_z} F{travel_spd_z}
        {% endfor %}

        # --- Phase 2: Circular scrub ---
        # Step across brush width, doing G2/G3 circles at each position
        {% for i in range(scrub_passes) %}
            {% set x_pos = start_x + (i * step) %}
            G1 X{x_pos} Y{cy} F{travel_spd_xy}

            {% for j in range(circles_per_pass) %}
                {% if alternate_direction and ((i + j) % 2 == 1) %}
                    G3 X{x_pos} Y{cy} I{circle_radius} J0 F{scrub_spd}
                {% else %}
                    G2 X{x_pos} Y{cy} I{circle_radius} J0 F{scrub_spd}
                {% endif %}
            {% endfor %}
        {% endfor %}

        # --- Depart: raise Z, move away from brush area ---
        G1 Z{clean_z + exit_z_lift} F{travel_spd_z}
        G1 Z{safe_z} F{travel_spd_z}
        G1 X150 F{travel_spd_xy}
        M117 Cleaned!

        RESTORE_GCODE_STATE NAME=clean_nozzle

    {% else %}
        { action_raise_error("Please home your axes!") }
        M117 Please home first!
    {% endif %}
