# KlipperScreen custom menus for Voron V2.4
# Include from KlipperScreen.conf: [include klipperscreen_menu.conf]

#####################################################################
#   Filament — Top-level menu (frequent operations)
#####################################################################

[menu __main filament]
name: Filament
icon: filament

[menu __main filament load_filament]
name: Load Filament
icon: arrow-down
method: printer.gcode.script
params: {"script":"LOAD_FILAMENT"}

[menu __main filament unload_filament]
name: Unload Filament
icon: arrow-up
method: printer.gcode.script
params: {"script":"UNLOAD_FILAMENT"}

[menu __main filament exchange_filament]
name: Exchange Filament
icon: shuffle
method: printer.gcode.script
params: {"script":"EXCHANGE_FILAMENT"}

#####################################################################
#   Maintenance — Hardware changes, PID, parking
#####################################################################

[menu __main maintenance]
name: Maintenance
icon: settings

[menu __main maintenance printer_status]
name: Printer Status
icon: info
method: printer.gcode.script
params: {"script":"SHOW_PRINTER_STATUS"}

[menu __main maintenance nozzle_change]
name: Change Nozzle
icon: extruder
method: printer.gcode.script
params: {"script":"NOZZLE_CHANGE"}

[menu __main maintenance hotend_change]
name: Change Hotend
icon: heat-up
method: printer.gcode.script
params: {"script":"HOTEND_CHANGE"}

[menu __main maintenance pid_hotend]
name: PID Hotend
icon: heat-up
method: printer.gcode.script
params: {"script":"AUTO_PID_HOTEND"}

[menu __main maintenance pid_bed]
name: PID Bed
icon: bed
method: printer.gcode.script
params: {"script":"AUTO_PID_BED"}

[menu __main maintenance park_front]
name: Park Front
icon: arrow-right
method: printer.gcode.script
params: {"script":"MAINTENANCE_POSITION POS=front"}

[menu __main maintenance park_center]
name: Park Center
icon: move
method: printer.gcode.script
params: {"script":"MAINTENANCE_POSITION POS=center"}
