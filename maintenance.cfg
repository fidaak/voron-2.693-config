#####################################################################
#   Maintenance Macros — Positioning, PID, Nozzle/Hotend Wizards
#   For Voron V2.4 with SHT36v2 CAN toolhead
#   Requires: [respond], [save_variables] in printer.cfg
#####################################################################

#####################################################################
#   CONFIG_VERSION — Show deployed config version (git hash)
#####################################################################

[gcode_macro CONFIG_VERSION]
description: Display deployed config version (git commit hash + date)
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set ver = svv.config_version|default("unknown")|string %}
    {% set date = svv.config_deployed|default("unknown")|string %}
    {% set hotend = svv.current_hotend|default("?")|string %}
    {% set nozzle = svv.current_nozzle|default("?")|string %}
    {% set ntype = svv.nozzle_type|default("?")|string %}
    {% set variant = svv.nozzle_variant|default("standard")|string %}
    # Human-readable hotend name
    {% if hotend == "dragon_hf" %}{% set hotend_name = "Dragon HF" %}
    {% elif hotend == "rapido_uhf" %}{% set hotend_name = "Rapido UHF" %}
    {% elif hotend == "rapido_std" %}{% set hotend_name = "Rapido" %}
    {% elif hotend == "raptor" %}{% set hotend_name = "Raptor ProtoXtend" %}
    {% else %}{% set hotend_name = hotend %}{% endif %}
    {% if variant == "cht" %}{% set vl = " CHT" %}{% else %}{% set vl = "" %}{% endif %}
    RESPOND MSG="Config: {ver} deployed {date}"
    RESPOND MSG="Hotend: {hotend_name} | Nozzle: {nozzle}mm{vl} ({ntype})"
    M117 {hotend_name} | {nozzle}mm{vl}

[delayed_gcode _STARTUP_CONFIG_VERSION]
initial_duration: 3
gcode:
    {% set svv = printer.save_variables.variables %}
    {% if svv.hotend_swap_pending|default(0)|int == 1 %}
        _HOTEND_RESUME_AFTER_RESTART
    {% else %}
        CONFIG_VERSION
    {% endif %}

#####################################################################
#   SHOW_PRINTER_STATUS — Hardware status dialog for KlipperScreen
#####################################################################

[gcode_macro SHOW_PRINTER_STATUS]
description: Show current hardware configuration in a dialog
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("unknown")|string %}
    {% set nozzle = svv.current_nozzle|default("?")|string %}
    {% set ntype = svv.nozzle_type|default("?")|string %}
    {% set variant = svv.nozzle_variant|default("standard")|string %}
    {% set ver = svv.config_version|default("not deployed")|string %}
    {% set date = svv.config_deployed|default("")|string %}
    # Human-readable hotend name
    {% if hotend == "dragon_hf" %}{% set hotend_name = "Dragon HF" %}
    {% elif hotend == "rapido_uhf" %}{% set hotend_name = "Rapido UHF" %}
    {% elif hotend == "rapido_std" %}{% set hotend_name = "Rapido" %}
    {% elif hotend == "raptor" %}{% set hotend_name = "Raptor ProtoXtend" %}
    {% else %}{% set hotend_name = hotend %}{% endif %}
    # Human-readable nozzle type
    {% if ntype == "hardened_steel" %}{% set ntype_name = "Hardened Steel" %}
    {% elif ntype == "brass" %}{% set ntype_name = "Brass" %}
    {% else %}{% set ntype_name = ntype %}{% endif %}
    # Nozzle variant label
    {% if variant == "cht" %}{% set variant_label = " CHT" %}
    {% else %}{% set variant_label = "" %}{% endif %}
    # Guard: do not clobber an active wizard dialog
    {% if printer["gcode_macro NOZZLE_CHANGE"].wizard_active == 1 or
          printer["gcode_macro HOTEND_CHANGE"].wizard_active == 1 %}
        RESPOND TYPE=error MSG="Cannot show status - a wizard is active. Finish or cancel it first."
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_begin Printer Status"
        RESPOND TYPE=command MSG="action:prompt_button Hotend: {hotend_name}|M400|info"
        RESPOND TYPE=command MSG="action:prompt_button Nozzle: {nozzle}mm{variant_label} ({ntype_name})|M400|info"
        RESPOND TYPE=command MSG="action:prompt_button Config: {ver}|M400|info"
        {% if date %}
        RESPOND TYPE=command MSG="action:prompt_button Deployed: {date}|M400|info"
        {% endif %}
        RESPOND TYPE=command MSG="action:prompt_footer_button Change Nozzle|NOZZLE_CHANGE|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Change Hotend|HOTEND_CHANGE|secondary"
        RESPOND TYPE=command MSG="action:prompt_footer_button Close|_DISMISS_STATUS|info"
        RESPOND TYPE=command MSG="action:prompt_show"
    {% endif %}

[gcode_macro _DISMISS_STATUS]
description: Close the printer status dialog
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"

#####################################################################
#   MAINTENANCE_POSITION — Park toolhead for physical access
#####################################################################

[gcode_macro MAINTENANCE_POSITION]
description: Move toolhead to ergonomic position for maintenance
gcode:
    {% set pos = params.POS|default("front")|string|lower %}
    # Never disable Z steppers — CoreXY gantry drops without power!
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                          ; home all if not homed
    {% endif %}
    G0 Z100 F3000                    ; safe Z first
    {% if pos == "nozzle" %}
        G0 X150 Y10 F18000           ; front center, high Z for nozzle access
        G0 Z200 F3000
    {% elif pos == "center" %}
        G0 X150 Y150 F18000          ; center of bed, hotend work
        G0 Z100 F3000
    {% elif pos == "rear" %}
        G0 X150 Y300 F18000          ; rear, electronics/umbilical access
        G0 Z200 F3000
    {% else %}
        G0 X150 Y10 F18000           ; front center, general access (default)
        G0 Z150 F3000
    {% endif %}
    STATUS_READY
    RESPOND MSG="Maintenance position: {pos}"

#####################################################################
#   AUTO_PID — One-command PID autotune
#####################################################################

[gcode_macro AUTO_PID_HOTEND]
description: PID autotune hotend and save (triggers Klipper restart)
gcode:
    {% set temp = params.TEMP|default(250)|int %}
    RESPOND MSG="PID tuning hotend at {temp}C — this takes a few minutes..."
    MAINTENANCE_POSITION POS=center
    M106 S128                        ; part cooling fan 50% for realistic PID
    PID_CALIBRATE HEATER=extruder TARGET={temp}
    M107                             ; fan off
    RESPOND MSG="PID tune complete. Saving and restarting..."
    SAVE_CONFIG

[gcode_macro AUTO_PID_BED]
description: PID autotune bed heater and save (triggers Klipper restart)
gcode:
    {% set temp = params.TEMP|default(110)|int %}
    RESPOND MSG="PID tuning bed at {temp}C — this takes a few minutes..."
    PID_CALIBRATE HEATER=heater_bed TARGET={temp}
    RESPOND MSG="PID tune complete. Saving and restarting..."
    SAVE_CONFIG

#####################################################################
#   NOZZLE_CHANGE — Multi-step guided wizard
#####################################################################

[gcode_macro NOZZLE_CHANGE]
description: Guided nozzle change wizard with Mainsail prompts
variable_wizard_active: 0
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set current_nozzle = svv.current_nozzle|default(0.4)|float %}
    {% set current_hotend = svv.current_hotend|default("dragon_hf")|string %}
    SET_GCODE_VARIABLE MACRO=NOZZLE_CHANGE VARIABLE=wizard_active VALUE=1
    RESPOND TYPE=command MSG="action:prompt_begin Nozzle Change Wizard"
    RESPOND TYPE=command MSG="action:prompt_text Current hotend: {current_hotend}"
    RESPOND TYPE=command MSG="action:prompt_text Current nozzle: {current_nozzle}mm"
    RESPOND TYPE=command MSG="action:prompt_text Have socket wrench and new nozzle ready."
    RESPOND TYPE=command MSG="action:prompt_footer_button Continue|_NOZZLE_STEP2|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_NOZZLE_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _NOZZLE_STEP2]
description: Heat and position for nozzle removal
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    # No dialog during heating — main screen shows live temp + M117 status
    M117 Heating to 250C... Next: remove nozzle with wrench
    M104 S250                        ; start heating (non-blocking)
    MAINTENANCE_POSITION POS=nozzle  ; front, high Z for nozzle access
    M109 S250                        ; wait for temp
    M117                             ; clear status message
    # Show action dialog once hot
    RESPOND TYPE=command MSG="action:prompt_begin Remove Nozzle"
    RESPOND TYPE=command MSG="action:prompt_text Hotend at 250C. Remove nozzle with wrench."
    RESPOND TYPE=command MSG="action:prompt_footer_button Nozzle Removed|_NOZZLE_STEP3|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_NOZZLE_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _NOZZLE_STEP3]
description: Select nozzle — filtered by installed hotend
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Select Nozzle"
    RESPOND TYPE=command MSG="action:prompt_text Hand-tighten, then 1/4 turn with wrench AT TEMPERATURE."
    {% if hotend == "dragon_hf" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.25mm Brass|_NOZZLE_CONFIRM DIAMETER=0.25 TYPE=brass VARIANT=standard|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Brass|_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=standard|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm CHT|_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=cht|primary"
    {% elif hotend == "rapido_uhf" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.6mm Volcano CHT|_NOZZLE_CONFIRM DIAMETER=0.6 TYPE=brass VARIANT=cht|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 0.8mm Volcano CHT|_NOZZLE_CONFIRM DIAMETER=0.8 TYPE=brass VARIANT=cht|primary"
        RESPOND TYPE=command MSG="action:prompt_button 1.0mm Volcano CHT|_NOZZLE_CONFIRM DIAMETER=1.0 TYPE=brass VARIANT=cht|secondary"
    {% elif hotend == "rapido_std" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Brass|_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=standard|primary"
        RESPOND TYPE=command MSG="action:prompt_button 0.6mm Brass|_NOZZLE_CONFIRM DIAMETER=0.6 TYPE=brass VARIANT=standard|secondary"
    {% elif hotend == "raptor" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Hardened|_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=hardened_steel VARIANT=standard|primary"
        RESPOND TYPE=command MSG="action:prompt_button 0.6mm Hardened|_NOZZLE_CONFIRM DIAMETER=0.6 TYPE=hardened_steel VARIANT=standard|secondary"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Brass|_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=standard|primary"
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_NOZZLE_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _NOZZLE_CONFIRM]
description: Save nozzle selection and offer Z calibration
gcode:
    {% set diameter = params.DIAMETER|float %}
    {% set ntype = params.TYPE|string %}
    {% set variant = params.VARIANT|default("standard")|string %}
    RESPOND TYPE=command MSG="action:prompt_end"
    SAVE_VARIABLE VARIABLE=current_nozzle VALUE={diameter}
    SAVE_VARIABLE VARIABLE=nozzle_type VALUE='"{ntype}"'
    SAVE_VARIABLE VARIABLE=nozzle_variant VALUE='"{variant}"'
    M104 S150                        ; cool down to safe temp
    {% if variant == "cht" %}{% set vl = " CHT" %}{% else %}{% set vl = "" %}{% endif %}
    {% if ntype == "hardened_steel" %}{% set tl = "Hardened Steel" %}{% else %}{% set tl = "Brass" %}{% endif %}
    RESPOND TYPE=command MSG="action:prompt_begin Nozzle Change Complete"
    RESPOND TYPE=command MSG="action:prompt_text {diameter}mm{vl} ({tl}) installed"
    RESPOND TYPE=command MSG="action:prompt_text Calibrate Z offset now?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Run CALIBRATE_Z|_NOZZLE_CALIBRATE|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Skip - Park|_NOZZLE_DONE|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _NOZZLE_CALIBRATE]
description: Run Z calibration after nozzle change
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M109 S150                        ; wait for cooldown
    RESPOND MSG="Running Z calibration..."
    G28 Z
    CALIBRATE_Z
    _NOZZLE_DONE

[gcode_macro _NOZZLE_DONE]
description: Finish nozzle change wizard
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M104 S0                          ; heater off
    MAINTENANCE_POSITION POS=front   ; complete movement first
    SET_GCODE_VARIABLE MACRO=NOZZLE_CHANGE VARIABLE=wizard_active VALUE=0
    {% set svv = printer.save_variables.variables %}
    {% set variant = svv.nozzle_variant|default("standard")|string %}
    {% if variant == "cht" %}{% set vl = " CHT" %}{% else %}{% set vl = "" %}{% endif %}
    RESPOND MSG="Nozzle change complete: {svv.current_nozzle|default(0.4)}mm{vl} ({svv.nozzle_type|default('brass')})"

[gcode_macro _NOZZLE_CANCEL]
description: Cancel nozzle change wizard safely
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M104 S0                          ; heater off
    RESPOND MSG="Nozzle change cancelled. Cooling down..."
    MAINTENANCE_POSITION POS=front   ; complete movement first
    SET_GCODE_VARIABLE MACRO=NOZZLE_CHANGE VARIABLE=wizard_active VALUE=0

#####################################################################
#   HOTEND_CHANGE — Multi-step guided wizard
#   PID values are swapped automatically via swap_hotend_pid.py
#   Requires: [gcode_shell_command] extra installed
#####################################################################

[gcode_shell_command swap_hotend_pid]
command: python3 /home/pi/printer_data/config/swap_hotend_pid.py
timeout: 10
verbose: True

[gcode_macro _HOTEND_RESUME_AFTER_RESTART]
description: Resume hotend wizard after FIRMWARE_RESTART (auto-detected on boot)
gcode:
    SET_GCODE_VARIABLE MACRO=HOTEND_CHANGE VARIABLE=wizard_active VALUE=1
    RESPOND MSG="Hotend swap detected — resuming wizard..."
    _HOTEND_STEP3

[gcode_macro HOTEND_CHANGE]
description: Guided hotend change wizard with Mainsail prompts
variable_wizard_active: 0
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set current_hotend = svv.current_hotend|default("dragon_hf")|string %}
    SET_GCODE_VARIABLE MACRO=HOTEND_CHANGE VARIABLE=wizard_active VALUE=1
    RESPOND TYPE=command MSG="action:prompt_begin Hotend Change Wizard"
    RESPOND TYPE=command MSG="action:prompt_text Current hotend: {current_hotend}"
    RESPOND TYPE=command MSG="action:prompt_text All hotends use PT100/MAX31865 - same wiring."
    RESPOND TYPE=command MSG="action:prompt_text PID values switch automatically."
    RESPOND TYPE=command MSG="action:prompt_footer_button Continue|_HOTEND_STEP2|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_HOTEND_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _HOTEND_STEP2]
description: Cool down and guide physical swap
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M104 S0                          ; heater off
    MAINTENANCE_POSITION POS=center
    RESPOND MSG="Cooling down hotend for safe handling..."
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=50
    # Persist wizard state — survives FIRMWARE_RESTART after SHUTDOWN
    SAVE_VARIABLE VARIABLE=hotend_swap_pending VALUE=1
    RESPOND TYPE=command MSG="action:prompt_begin Hotend Swap Instructions"
    RESPOND TYPE=command MSG="action:prompt_text Hotend cooled to safe temp."
    RESPOND TYPE=command MSG="action:prompt_text ."
    RESPOND TYPE=command MSG="action:prompt_text 1. Press Shut Down for Swap below"
    RESPOND TYPE=command MSG="action:prompt_text 2. Disconnect heater + thermistor from SHT36v2"
    RESPOND TYPE=command MSG="action:prompt_text 3. Swap the hotend physically"
    RESPOND TYPE=command MSG="action:prompt_text 4. Reconnect heater + thermistor wires"
    RESPOND TYPE=command MSG="action:prompt_text 5. Click FIRMWARE RESTART in Mainsail"
    RESPOND TYPE=command MSG="action:prompt_text ."
    RESPOND TYPE=command MSG="action:prompt_text Wizard resumes automatically after restart."
    RESPOND TYPE=command MSG="action:prompt_footer_button Shut Down for Swap|_HOTEND_CONTROLLED_SHUTDOWN|warning"
    RESPOND TYPE=command MSG="action:prompt_footer_button Swap Complete|_HOTEND_STEP3|secondary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_HOTEND_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _HOTEND_CONTROLLED_SHUTDOWN]
description: Controlled shutdown for safe hotend swap
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    M117 HOTEND SWAP: Reconnect wires, then FIRMWARE RESTART
    {action_emergency_stop("HOTEND SWAP in progress. Disconnect wires, swap hotend, reconnect, then click FIRMWARE RESTART. The wizard will resume automatically.")}

[gcode_macro _HOTEND_STEP3]
description: Select which hotend was installed
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND TYPE=command MSG="action:prompt_begin Which Hotend?"
    RESPOND TYPE=command MSG="action:prompt_text Select the hotend you installed:"
    RESPOND TYPE=command MSG="action:prompt_button Dragon HF|_HOTEND_SELECT HOTEND=dragon_hf PA=0.045 NTYPE=brass|primary"
    RESPOND TYPE=command MSG="action:prompt_button Rapido UHF|_HOTEND_SELECT HOTEND=rapido_uhf PA=0.03 NTYPE=brass|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Rapido (standard)|_HOTEND_SELECT HOTEND=rapido_std PA=0.035 NTYPE=brass|secondary"
    RESPOND TYPE=command MSG="action:prompt_button Raptor ProtoXtend|_HOTEND_SELECT HOTEND=raptor PA=0.04 NTYPE=hardened_steel|secondary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_HOTEND_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _HOTEND_SELECT]
description: Save hotend selection, swap PID, chain to nozzle selection
gcode:
    {% set hotend = params.HOTEND|string %}
    {% set pa = params.PA|float %}
    {% set ntype = params.NTYPE|string %}
    RESPOND TYPE=command MSG="action:prompt_end"
    # Clear pending swap flag (wizard is now active, no longer "pending")
    SAVE_VARIABLE VARIABLE=hotend_swap_pending VALUE=0
    # Save hotend to persistent variables (read by swap_hotend_pid.py)
    SAVE_VARIABLE VARIABLE=current_hotend VALUE='"{hotend}"'
    # Apply pressure advance immediately
    SET_PRESSURE_ADVANCE ADVANCE={pa}
    # Swap PID values in printer.cfg automatically
    RESPOND MSG="Swapping PID values for {hotend}..."
    RUN_SHELL_COMMAND CMD=swap_hotend_pid
    # Chain to nozzle selection for the new hotend
    _HOTEND_NOZZLE_SELECT HOTEND={hotend} NTYPE={ntype}

[gcode_macro _HOTEND_NOZZLE_SELECT]
description: Select nozzle for newly installed hotend
gcode:
    {% set hotend = params.HOTEND|string %}
    {% set ntype = params.NTYPE|default("brass")|string %}
    {% set svv = printer.save_variables.variables %}
    {% set cur_nozzle = svv.current_nozzle|default(0.4)|float %}
    {% set cur_type = svv.nozzle_type|default("brass")|string %}
    {% set cur_variant = svv.nozzle_variant|default("standard")|string %}
    {% if cur_variant == "cht" %}{% set cvl = " CHT" %}{% else %}{% set cvl = "" %}{% endif %}
    RESPOND TYPE=command MSG="action:prompt_begin Select Nozzle"
    RESPOND TYPE=command MSG="action:prompt_text Which nozzle is on this hotend?"
    RESPOND TYPE=command MSG="action:prompt_button Keep: {cur_nozzle}mm{cvl} ({cur_type})|_HOTEND_NOZZLE_CONFIRM DIAMETER={cur_nozzle} TYPE={cur_type} VARIANT={cur_variant}|info"
    {% if hotend == "dragon_hf" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.25mm Brass|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.25 TYPE=brass VARIANT=standard|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Brass|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=standard|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm CHT|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=cht|primary"
    {% elif hotend == "rapido_uhf" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.6mm Volcano CHT|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.6 TYPE=brass VARIANT=cht|secondary"
        RESPOND TYPE=command MSG="action:prompt_button 0.8mm Volcano CHT|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.8 TYPE=brass VARIANT=cht|primary"
        RESPOND TYPE=command MSG="action:prompt_button 1.0mm Volcano CHT|_HOTEND_NOZZLE_CONFIRM DIAMETER=1.0 TYPE=brass VARIANT=cht|secondary"
    {% elif hotend == "rapido_std" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Brass|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=standard|primary"
        RESPOND TYPE=command MSG="action:prompt_button 0.6mm Brass|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.6 TYPE=brass VARIANT=standard|secondary"
    {% elif hotend == "raptor" %}
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Hardened|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=hardened_steel VARIANT=standard|primary"
        RESPOND TYPE=command MSG="action:prompt_button 0.6mm Hardened|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.6 TYPE=hardened_steel VARIANT=standard|secondary"
    {% else %}
        RESPOND TYPE=command MSG="action:prompt_button 0.4mm Brass|_HOTEND_NOZZLE_CONFIRM DIAMETER=0.4 TYPE=brass VARIANT=standard|primary"
    {% endif %}
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancel|_HOTEND_CANCEL|error"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _HOTEND_NOZZLE_CONFIRM]
description: Save nozzle after hotend change, show completion
gcode:
    {% set diameter = params.DIAMETER|float %}
    {% set ntype = params.TYPE|string %}
    {% set variant = params.VARIANT|default("standard")|string %}
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("unknown")|string %}
    RESPOND TYPE=command MSG="action:prompt_end"
    SAVE_VARIABLE VARIABLE=current_nozzle VALUE={diameter}
    SAVE_VARIABLE VARIABLE=nozzle_type VALUE='"{ntype}"'
    SAVE_VARIABLE VARIABLE=nozzle_variant VALUE='"{variant}"'
    # Human-readable labels
    {% if variant == "cht" %}{% set vl = " CHT" %}{% else %}{% set vl = "" %}{% endif %}
    {% if ntype == "hardened_steel" %}{% set tl = "Hardened Steel" %}{% else %}{% set tl = "Brass" %}{% endif %}
    {% if hotend == "dragon_hf" %}{% set hn = "Dragon HF" %}
    {% elif hotend == "rapido_uhf" %}{% set hn = "Rapido UHF" %}
    {% elif hotend == "rapido_std" %}{% set hn = "Rapido" %}
    {% elif hotend == "raptor" %}{% set hn = "Raptor ProtoXtend" %}
    {% else %}{% set hn = hotend %}{% endif %}
    RESPOND TYPE=command MSG="action:prompt_begin Hotend + Nozzle Changed"
    RESPOND TYPE=command MSG="action:prompt_text Hotend: {hn}"
    RESPOND TYPE=command MSG="action:prompt_text Nozzle: {diameter}mm{vl} ({tl})"
    RESPOND TYPE=command MSG="action:prompt_text PID values updated in printer.cfg."
    RESPOND TYPE=command MSG="action:prompt_text Klipper restart needed to apply PID."
    RESPOND TYPE=command MSG="action:prompt_text After restart: calibrate Z (nozzle tip changed)."
    RESPOND TYPE=command MSG="action:prompt_footer_button Restart Now|_HOTEND_RESTART|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button PID Retune Instead|_HOTEND_PID|secondary"
    RESPOND TYPE=command MSG="action:prompt_show"

[gcode_macro _HOTEND_RESTART]
description: Restart Klipper to apply new PID values
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=HOTEND_CHANGE VARIABLE=wizard_active VALUE=0
    RESPOND MSG="Restarting Klipper with new PID values..."
    RESTART

[gcode_macro _HOTEND_PID]
description: Run PID autotune after hotend change (optional, overwrites stored values)
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=HOTEND_CHANGE VARIABLE=wizard_active VALUE=0
    RESPOND MSG="Running PID autotune — will restart Klipper when done..."
    AUTO_PID_HOTEND

[gcode_macro _HOTEND_DONE]
description: Finish hotend change wizard
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=HOTEND_CHANGE VARIABLE=wizard_active VALUE=0
    SAVE_VARIABLE VARIABLE=hotend_swap_pending VALUE=0
    M104 S0
    MAINTENANCE_POSITION POS=front
    {% set svv = printer.save_variables.variables %}
    {% set variant = svv.nozzle_variant|default("standard")|string %}
    {% if variant == "cht" %}{% set vl = " CHT" %}{% else %}{% set vl = "" %}{% endif %}
    RESPOND MSG="Hotend change complete: {svv.current_hotend|default('unknown')} with {svv.current_nozzle|default('?')}mm{vl} nozzle"
    RESPOND MSG="Next: Calibrate Z offset (CALIBRATE_Z) — nozzle tip position changed."

[gcode_macro _HOTEND_CANCEL]
description: Cancel hotend change wizard safely
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    SET_GCODE_VARIABLE MACRO=HOTEND_CHANGE VARIABLE=wizard_active VALUE=0
    SAVE_VARIABLE VARIABLE=hotend_swap_pending VALUE=0
    M104 S0
    RESPOND MSG="Hotend change cancelled."

#####################################################################
#   _NOZZLE_CHECK_OVERRIDE — Used by PRINT_START mismatch prompt
#####################################################################

[gcode_macro _NOZZLE_CHECK_OVERRIDE]
description: User chose to print despite nozzle mismatch
gcode:
    RESPOND TYPE=command MSG="action:prompt_end"
    RESPOND MSG="Nozzle check overridden by user"
    RESUME
