# Speed Profile Macros for Voron V2.4 300mm
#
# Two modes:
#   QUALITY_MODE — MZV shaper, within shaper accel limits, near-zero ringing
#   DRAFT_MODE   — ZV shaper, higher accel, slight ringing on outer walls acceptable
#
# Usage: call in OrcaSlicer start G-code after PRINT_START, or from Mainsail console.
# OrcaSlicer per-feature acceleration settings control the actual speeds per feature.
#
# Calibrated 2026-03-28 on concrete floor, warm chamber 35°C:
#   X: 55.0 Hz primary, Y: 43.4 Hz primary
#   Hardware tested: 1000 mm/s, 18000 mm/s² (no step loss)

[gcode_macro QUALITY_MODE]
description: MZV shaper, within shaper limits — perfect surface quality
gcode:
    SET_INPUT_SHAPER SHAPER_TYPE_X=MZV SHAPER_TYPE_Y=MZV SHAPER_FREQ_X=55.0 SHAPER_FREQ_Y=43.4
    SET_VELOCITY_LIMIT ACCEL=5500 VELOCITY=400
    {action_respond_info("QUALITY MODE: MZV shaper, accel 5500, velocity 400")}
    {action_respond_info("Recommended OrcaSlicer: outer wall 300/3000, inner 350/5000, infill 400/5500")}

[gcode_macro DRAFT_MODE]
description: ZV shaper, high accel — fast functional parts with slight ringing
gcode:
    SET_INPUT_SHAPER SHAPER_TYPE_X=ZV SHAPER_TYPE_Y=ZV SHAPER_FREQ_X=55.0 SHAPER_FREQ_Y=43.4
    SET_VELOCITY_LIMIT ACCEL=12000 VELOCITY=600
    {action_respond_info("DRAFT MODE: ZV shaper, accel 12000, velocity 600")}
    {action_respond_info("Recommended OrcaSlicer: outer wall 300/5000, inner 350/10000, infill 354/12000")}

[gcode_macro SPEED_DEMON_MODE]
description: ZV shaper, max accel — thin layers, high velocity, ringing visible
gcode:
    SET_INPUT_SHAPER SHAPER_TYPE_X=ZV SHAPER_TYPE_Y=ZV SHAPER_FREQ_X=55.0 SHAPER_FREQ_Y=43.4
    SET_VELOCITY_LIMIT ACCEL=15000 VELOCITY=800
    {action_respond_info("SPEED DEMON MODE: ZV shaper, accel 15000, velocity 800")}
    {action_respond_info("Recommended OrcaSlicer: outer wall 400/5000, inner 500/12000, infill 530/12000")}

[gcode_macro RESTORE_DEFAULTS]
description: Restore MZV shaper and default velocity limits (call in PRINT_END)
gcode:
    SET_INPUT_SHAPER SHAPER_TYPE_X=MZV SHAPER_TYPE_Y=MZV SHAPER_FREQ_X=55.0 SHAPER_FREQ_Y=43.4
    SET_VELOCITY_LIMIT ACCEL=8840 VELOCITY=800
