#####################################################################
#   First Layer Calibration Macros — Z-Offset Sweep & Flow Matrix
#   For Voron V2.4 with z_calibration plugin (Klicky probe)
#   Requires: [respond], [save_variables] in printer.cfg
#
#   Usage:
#     1. Heat bed + chamber to normal ABS/ASA temps
#     2. Run FIRST_LAYER_CALIBRATE (Z-offset sweep) or
#            FIRST_LAYER_MATRIX (Z × Flow grid) or
#            FIRST_LAYER_SINGLE (Ellis babystep method)
#     3. Photograph result under raking light (low angle)
#     4. Identify best patch, apply offset to switch_offset
#
#   These macros handle their own homing, QGL, z_calibration,
#   and nozzle cleaning. They are standalone — do not call from
#   within PRINT_START or mid-print.
#
#   NOTE: After these macros finish, CALIBRATE_Z offset is cleared.
#   You MUST re-home + CALIBRATE_Z before printing normally.
#   (This is handled automatically by PRINT_START.)
#####################################################################

#####################################################################
#   FIRST_LAYER_CALIBRATE — Z-Offset Sweep (1×N row)
#
#   Prints N patches at Z offsets relative to z_calibration baseline.
#   Default range: -0.04 to +0.04mm in 0.01mm steps (9 patches).
#
#   Usage: FIRST_LAYER_CALIBRATE [BED=110] [HOTEND=245] [SPEED=60]
#          FIRST_LAYER_CALIBRATE COUNT=6 STEP=0.02   (fewer, wider steps)
#
#   After printing, find the best patch (1=leftmost). Adjust
#   switch_offset in z_calibration.cfg by that patch's offset.
#   More squish = higher switch_offset (nozzle moves closer to bed)
#####################################################################

[gcode_macro FIRST_LAYER_CALIBRATE]
description: Print N patches at different Z offsets to find optimal first layer squish
variable_cal_active: 0
gcode:
    {% set bedtemp = params.BED|default(110)|int %}
    {% set hotendtemp = params.HOTEND|default(245)|int %}
    {% set speed = params.SPEED|default(60)|int %}
    {% set step = params.STEP|default(0.01)|float %}
    {% set layer_h = params.HEIGHT|default(0.2)|float %}
    {% set count = params.COUNT|default(9)|int %}

    # Patch geometry — N patches in a row, centered on 303mm bed
    {% set pw = 25 %}
    {% set ph = 25 %}
    {% set gap = 5 %}
    {% set total_w = count * pw + (count - 1) * gap %}
    {% set x_start = ((303 - total_w) / 2)|int %}
    {% set y_start = 130 %}

    # Z offsets centered around 0 — symmetric range
    # N patches: indices 0 to N-1, offsets at -(N/2-0.5), ..., -0.5, +0.5, ..., +(N/2-0.5) × step
    {% set half_count = count / 2.0 %}

    {% if printer.idle_timeout.state == "Printing" %}
        RESPOND TYPE=error MSG="Cannot run calibration during a print"
    {% else %}
        SET_GCODE_VARIABLE MACRO=FIRST_LAYER_CALIBRATE VARIABLE=cal_active VALUE=1
        RESPOND MSG="=== First Layer Z-Offset Calibration ==="
        RESPOND MSG="Patches: {count} | Step: {step}mm"
        RESPOND MSG="Bed: {bedtemp}C | Hotend: {hotendtemp}C | Speed: {speed}mm/s"

        # --- Prep sequence (mirrors PRINT_START) ---
        _CALIBRATION_PREP BED={bedtemp} HOTEND={hotendtemp}

        # --- Print patches ---
        {% for i in range(count) %}
            {% set z_adj = ((i - half_count + 0.5) * step)|round(3) %}
            {% set x = x_start + i * (pw + gap) %}
            RESPOND MSG="Patch {i + 1}/{count}: Z_ADJUST={z_adj}mm"
            SET_GCODE_OFFSET Z_ADJUST={z_adj} MOVE=0
            _CALIBRATION_PATCH X={x} Y={y_start} W={pw} H={ph} LAYER_H={layer_h} SPEED={speed}
            SET_GCODE_OFFSET Z_ADJUST={-z_adj} MOVE=0
        {% endfor %}

        # --- Cleanup ---
        _CALIBRATION_CLEANUP

        RESPOND MSG="=== Calibration complete ==="
        RESPOND MSG="Patch layout (left to right):"
        {% for i in range(count) %}
            {% set z_adj = ((i - half_count + 0.5) * step)|round(3) %}
            RESPOND MSG="  Patch {i + 1}: Z {'+' if z_adj >= 0 else ''}{z_adj}mm"
        {% endfor %}
        RESPOND MSG="Pick best patch. Adjust switch_offset by that value."
        RESPOND MSG="More squish → increase switch_offset"
        RESPOND MSG="WARNING: Run PRINT_START (or re-home + CALIBRATE_Z) before next print."
    {% endif %}

#####################################################################
#   FIRST_LAYER_MATRIX — Z-Offset × Flow Rate Grid (4×4 = 16 patches)
#
#   Rows  = Z offset:  -0.04, -0.02, 0.00, +0.02  (bottom to top)
#   Cols  = Flow rate:   95%, 100%, 105%, 110%      (left to right)
#
#   Usage: FIRST_LAYER_MATRIX [BED=110] [HOTEND=245] [SPEED=30]
#
#   Decouples Z offset from extrusion rate in a single print.
#   Photograph under raking light — pick the best row (Z) and
#   column (flow) independently.
#####################################################################

[gcode_macro FIRST_LAYER_MATRIX]
description: Print 4x4 grid of Z-offset x flow rate patches for first layer tuning
variable_cal_active: 0
gcode:
    {% set bedtemp = params.BED|default(110)|int %}
    {% set hotendtemp = params.HOTEND|default(245)|int %}
    {% set speed = params.SPEED|default(60)|int %}
    {% set layer_h = params.HEIGHT|default(0.2)|float %}

    # Grid geometry — 4x4 patches centered on bed
    {% set pw = 30 %}
    {% set ph = 30 %}
    {% set gap = 8 %}
    {% set cols = 4 %}
    {% set rows = 4 %}
    {% set total_w = cols * pw + (cols - 1) * gap %}
    {% set total_h = rows * ph + (rows - 1) * gap %}
    {% set x_start = ((303 - total_w) / 2)|int %}
    {% set y_start = ((308 - total_h) / 2)|int %}

    # Parameter ranges
    {% set z_offsets = [-0.04, -0.02, 0.00, 0.02] %}
    {% set flow_rates = [95, 100, 105, 110] %}

    {% if printer.idle_timeout.state == "Printing" %}
        RESPOND TYPE=error MSG="Cannot run calibration during a print"
    {% else %}
        SET_GCODE_VARIABLE MACRO=FIRST_LAYER_MATRIX VARIABLE=cal_active VALUE=1
        RESPOND MSG="=== First Layer Z x Flow Matrix ==="
        RESPOND MSG="Grid: {rows}x{cols} | Patch: {pw}x{ph}mm"
        RESPOND MSG="Rows (bottom to top): Z {z_offsets}"
        RESPOND MSG="Cols (left to right): Flow {flow_rates}%"

        # --- Prep sequence ---
        _CALIBRATION_PREP BED={bedtemp} HOTEND={hotendtemp}

        # --- Print grid ---
        {% for row in range(rows) %}
            {% set z_adj = z_offsets[row] %}
            {% set y = y_start + row * (ph + gap) %}
            SET_GCODE_OFFSET Z_ADJUST={z_adj} MOVE=0

            {% for col in range(cols) %}
                {% set flow = flow_rates[col] %}
                {% set x = x_start + col * (pw + gap) %}
                RESPOND MSG="Row {row + 1} Col {col + 1}: Z={z_adj}mm Flow={flow}%"
                M221 S{flow}
                _CALIBRATION_PATCH X={x} Y={y} W={pw} H={ph} LAYER_H={layer_h} SPEED={speed}
            {% endfor %}

            SET_GCODE_OFFSET Z_ADJUST={-z_adj} MOVE=0
        {% endfor %}

        # --- Cleanup ---
        _CALIBRATION_CLEANUP

        RESPOND MSG="=== Matrix complete ==="
        RESPOND MSG="Grid layout (viewed from front of printer):"
        RESPOND MSG="         Flow:  95%    100%   105%   110%"
        RESPOND MSG="  (top)  Z +0.02:  [13]   [14]   [15]   [16]"
        RESPOND MSG="         Z  0.00:  [ 9]   [10]   [11]   [12]"
        RESPOND MSG="         Z -0.02:  [ 5]   [ 6]   [ 7]   [ 8]"
        RESPOND MSG="  (bot)  Z -0.04:  [ 1]   [ 2]   [ 3]   [ 4]"
        RESPOND MSG="Pick best row (Z) and column (flow) independently."
        RESPOND MSG="Adjust switch_offset by Z value, slicer flow by flow %."
        RESPOND MSG="WARNING: Run PRINT_START (or re-home + CALIBRATE_Z) before next print."
    {% endif %}

#####################################################################
#   FIRST_LAYER_SINGLE — Simple single large square for babystep
#   Ellis-style: print one big square, babystep Z live in Mainsail
#
#   Usage: FIRST_LAYER_SINGLE [BED=110] [HOTEND=245] [SIZE=100]
#
#   SIZE capped at 120mm to avoid Klipper Jinja render limits.
#   For larger areas, use Ellis' STL patches in the slicer instead.
#####################################################################

[gcode_macro FIRST_LAYER_SINGLE]
description: Print a single large first-layer square for live Z babystep tuning (Ellis method)
gcode:
    {% set bedtemp = params.BED|default(110)|int %}
    {% set hotendtemp = params.HOTEND|default(245)|int %}
    {% set speed = params.SPEED|default(30)|int %}
    {% set size_raw = params.SIZE|default(100)|int %}
    {% set layer_h = params.HEIGHT|default(0.2)|float %}

    # Cap size to avoid Jinja render limits (~333 lines max safe)
    # 120mm / 0.36mm spacing = 333 lines — near safe limit
    {% set size = [size_raw, 120]|min %}

    {% set x_start = ((303 - size) / 2)|int %}
    {% set y_start = ((308 - size) / 2)|int %}

    {% if printer.idle_timeout.state == "Printing" %}
        RESPOND TYPE=error MSG="Cannot run calibration during a print"
    {% else %}
        {% if size_raw > 120 %}
            RESPOND MSG="SIZE capped at 120mm (Klipper Jinja limit). Use slicer STL for larger."
        {% endif %}
        RESPOND MSG="=== First Layer Babystep Test ==="
        RESPOND MSG="Size: {size}x{size}mm | Use Mainsail Tune > Babystep Z to adjust live"
        RESPOND MSG="Goal: lines barely touch, slightly flattened oval cross-section"

        # --- Prep sequence ---
        _CALIBRATION_PREP BED={bedtemp} HOTEND={hotendtemp}

        # Print large patch
        RESPOND MSG="Printing {size}x{size}mm patch — adjust Z babystep now!"
        _CALIBRATION_PATCH X={x_start} Y={y_start} W={size} H={size} LAYER_H={layer_h} SPEED={speed}

        # Note the babystep BEFORE cleanup wipes it
        RESPOND MSG="=== Done ==="
        RESPOND MSG="Note your final babystep offset from Mainsail NOW (before it resets)."
        RESPOND MSG="Adjust switch_offset by that value and SAVE_CONFIG."

        # Cleanup (this wipes Z offset — user must note value above first)
        _CALIBRATION_CLEANUP
    {% endif %}

#####################################################################
#   _CALIBRATION_PREP — Shared setup for all calibration macros
#   Handles: homing, QGL, z_calibration, nozzle cleaning, reprime
#####################################################################

[gcode_macro _CALIBRATION_PREP]
gcode:
    {% set bedtemp = params.BED|default(110)|int %}
    {% set hotendtemp = params.HOTEND|default(245)|int %}

    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=0
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=160
    M140 S{bedtemp}
    CHAMBER_FANS HEATER_TARGET={bedtemp} FAN_TARGET=75
    BED_MESH_CLEAR
    G28 X Y
    Attach_Probe_Lock
    G28 Z
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bedtemp}
    _Probe_Unlock
    QUAD_GANTRY_LEVEL
    G28 X Y
    BED_MESH_PROFILE LOAD=magneticSheet_110Deg_230109_1
    M109 S{hotendtemp}
    CLEAN_NOZZLE
    _FILAMENT_TIP_FORM
    CALIBRATE_Z

    # Reprime filament (hotend-aware, same as PRINT_START)
    {% set svv = printer.save_variables.variables %}
    {% set hotend = svv.current_hotend|default("dragon_hf")|string %}
    {% if hotend == "rapido_uhf" %}{% set reprime = 28 %}
    {% elif hotend == "raptor" %}{% set reprime = 21 %}
    {% else %}{% set reprime = 28 %}{% endif %}
    SAVE_GCODE_STATE NAME=cal_reprime
    M83
    G1 E{reprime} F600
    RESTORE_GCODE_STATE NAME=cal_reprime

    # Purge line along left edge
    G90
    G1 X2 Y10 Z0.25 F18000
    G92 E0
    G1 Y120 Z0.25 F1500 E15
    G92 E0
    G1 Z2 F3000

#####################################################################
#   _CALIBRATION_CLEANUP — Shared teardown for all calibration macros
#####################################################################

[gcode_macro _CALIBRATION_CLEANUP]
gcode:
    SET_GCODE_OFFSET Z=0 MOVE=0
    M221 S100
    M82
    G1 Z5 F3000
    G0 X150 Y300 F18000
    TURN_OFF_HEATERS
    M107
    SET_FILAMENT_SENSOR SENSOR=toolhead_filament_sensor ENABLE=1

#####################################################################
#   _CALIBRATION_PATCH — Fill a rectangular area with raster lines
#   Internal helper — called by FIRST_LAYER_CALIBRATE and MATRIX
#
#   Prints a solid filled rectangle using back-and-forth raster
#   lines at first-layer height. Line spacing = 90% of nozzle
#   diameter for slight overlap (good squish visibility).
#
#   Jinja line count = H / (nozzle_dia * 0.9). For 30mm patch
#   with 0.4mm nozzle: ~83 lines. Safe up to ~333 lines (120mm).
#####################################################################

[gcode_macro _CALIBRATION_PATCH]
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set w = params.W|float %}
    {% set h = params.H|float %}
    {% set layer_h = params.LAYER_H|default(0.2)|float %}
    {% set speed = params.SPEED|default(30)|int %}

    # Nozzle-aware line spacing: 90% of nozzle diameter for overlap
    {% set svv = printer.save_variables.variables %}
    {% set nozzle_dia = svv.current_nozzle|default(0.4)|float %}
    {% if nozzle_dia < 0.1 %}{% set nozzle_dia = 0.4 %}{% endif %}
    {% set line_w = nozzle_dia * 1.2 %}
    {% set line_spacing = nozzle_dia * 0.9 %}
    {% set num_lines = ((h / line_spacing)|int) %}

    # Extrusion: E = (line_w x layer_h x distance) / (pi/4 x 1.75^2)
    # For 1.75mm filament: pi/4 x 1.75^2 = 2.405
    {% set e_per_mm = (line_w * layer_h) / 2.405 %}
    {% set e_step = line_spacing * e_per_mm %}

    G90               ; absolute positioning
    M83               ; relative extrusion

    # Travel to patch start, then de-retract at destination
    G0 X{x} Y{y} Z{layer_h} F18000
    G1 E0.5 F3600

    # Raster fill: continuous zigzag extrusion (no travel gaps)
    {% for line in range(num_lines) %}
        {% set ly = y + line * line_spacing %}
        {% if line == 0 %}
            # First line: extrude left-to-right
            G1 X{x + w} Y{ly} E{(w * e_per_mm)|round(4)} F{speed * 60}
        {% elif line % 2 == 1 %}
            # Step in Y, then extrude right-to-left
            G1 Y{ly} E{e_step|round(4)} F{speed * 60}
            G1 X{x} Y{ly} E{(w * e_per_mm)|round(4)} F{speed * 60}
        {% else %}
            # Step in Y, then extrude left-to-right
            G1 Y{ly} E{e_step|round(4)} F{speed * 60}
            G1 X{x + w} Y{ly} E{(w * e_per_mm)|round(4)} F{speed * 60}
        {% endif %}
    {% endfor %}

    # Retract + lift between patches
    G1 E-0.5 F3600
    G0 Z{layer_h + 2} F3000
    M82               ; restore absolute extrusion (Klipper default)
