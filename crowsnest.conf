#### crowsnest.conf — CSI camera via legacy MMAL/V4L2 stack
#### Avoids ov5647 I2C timeout bug in libcamera/unicam on kernel 6.12.75
#### Port 8080 = /webcam/?action=[stream/snapshot]
#### When ET201 USB camera is installed, add [cam 2] on port 8081

[crowsnest]
log_path: /home/pi/printer_data/logs/crowsnest.log
log_level: verbose
delete_log: false
no_proxy: false

[cam 1]
mode: ustreamer
port: 8080
device: /dev/video0
resolution: 1296x972
max_fps: 15
